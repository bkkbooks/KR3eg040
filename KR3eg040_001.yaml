body:
  text: 卷上病情篇第一總義素問六元正紀大論曰太陰所至為中滿霍亂吐下太陰濕土之氣內應於脾中滿霍亂吐下多中焦濕邪為病故太陰所至不必泥定司天在泉而論也五運分步春分後交二運火旺天乃漸熱芒種後交三運土旺地乃漸濕濕熱之氣上騰烈日之暑下爍人在氣交之中受其蒸淫邪由口鼻皮毛而入留而不去則成溫熱暑疫諸病霍亂特其一證也若其人中陽素餒土不勝濕或飲冷貪涼太過則濕遂從寒化而成霍亂者亦有之然熱化者天運之自然寒化者體氣之或爾知常知變庶可治無不當也靈樞經脈篇曰足太陰厥氣上逆則霍亂足太陰脾土臟也其應在濕其性喜燥鎮中樞而主升清降濁之司惟濕盛而滯其升降之機則濁反厥逆於上清反抑陷於下而為霍亂雖有熱化寒化之分治宜宣其濁則逆自平而亂乃定清自升也傷寒論曰病有霍亂者何答曰嘔吐而利名曰霍亂此設為問答以明霍亂之病謂邪在上者多吐邪在下者多利邪在中焦上逆而為嘔吐復下注而利者則為霍亂霍亂者揮霍悶亂成於頃刻變動不安之謂也若上不能納下不能禁之久病但名吐利不得謂之霍亂也又曰病發熱頭痛身痛惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也徐洄溪曰此霍亂是傷寒變證郭白雲曰此論霍亂似傷寒之證蓋傷寒而霍亂者陰陽二氣亂於胸中也初無病而霍亂者往往飲食失節而致胸中逆亂也經云清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是為大悗亂於腸胃則為霍亂惟亂於胸所以吐亂於腸所以利經言五亂霍亂其一也張路玉曰傷寒吐利由邪氣所傷霍亂吐利由飲食所傷其有兼傷寒之邪內外不和加之頭痛發熱而吐利者是傷寒霍亂也雄案霍亂有因飲食所傷者有因濕邪內蘊者有因氣鬱不舒者但既有發熱頭痛身痛惡寒之表證則治法必當兼理其表此仲聖主五苓散之義也然表證之可兼者不獨寒也如吸受溫熱風暑之邪者皆能兼見表證舉隅三反活法在人其溫暑直侵脾胃與內邪相協為虐逮裡氣和而吐利止則邪復還之表而為發熱者駕輕湯主之寒霍亂後表不解者有仲聖之桂枝法在醫徹曰霍亂之候其來暴疾腹中㽱痛擾亂不安有吐瀉交作有吐而不瀉瀉而不吐有不得吐而又不得瀉則邪有上下淺深之分而總以得吐為愈邪有入必有出鹽湯探吐上妙法門然後調其胃氣可也蓋霍亂每傷於胃雖風寒暑濕四氣相乘而中必先虛故邪入焉至飲食失和穢邪觸感者尤多胃氣一傷清濁相干邪不去則正不安所以攻邪尤要於扶正也即至肢冷脈伏轉筋聲啞亦必驅逆至盡蓋邪去則正安非比他證養正而邪自除也所以當其發時不可用米飲先哲諄諄戒之豈無謂哉觀於乾霍亂上不得吐下不得瀉亦因邪不能出所以為劇治者益可思其故矣此治霍亂之大法也總以得吐為邪有出路者承上不得吐瀉之乾霍亂言也邪不去則正不安尤為治諸病之名言但霍亂雖無養正則邪自除之理而虛多邪少之證亦間有之治宜攘外安中並用又未嘗無其法也病源曰霍亂脈大可治微細不可治霍亂吐下脈微遲氣息劣口不欲言者不可治治法匯曰吐瀉脈代乃是順候氣口脈弦滑乃膈間有宿食雖吐猶當以鹽湯鵝翎探之吐盡用和中藥凡吐瀉脈見結促代或隱伏或洪大皆不可斷以為死果脈來微細欲絶少氣不語舌卷囊縮者方為不治醫通曰脈伏或微澀者霍亂脈長為陽明本病霍亂脈洪大吉虛微遲細兼喘者凶霍亂之後陽氣已脫或遺溺不知或氣怯不語或膏汗如珠或躁欲入水或四肢不收舌卷囊縮皆為死候金簠齋轉筋證治云此證重者立時脈伏乃邪閉而氣道不宣勿輕信庸工為脈絶不救也案營虛氣奪脈微欲絶者復脈湯主之氣散陽飛脈微欲絶者四逆湯主之若客邪深入氣機痹塞脈道不能流通而按之不見者為伏脈此為實證與絶脈判若天淵苟遇伏脈而不亟從宣通開泄之治則脈亦伏而漸絶矣但此乃邪閉之絶彼為元脫之絶脫者誤開陽亡而死閉者誤補邪錮而死又案天士云經曰暴病暴死皆屬於火火鬱於內不能外達故似寒證關竅閉塞經絡不通脈道不行多見沉滯無火之脈愚謂各證皆然舉一可例其餘然非閲歷深者不能知此熱證素問六元正紀大論曰土鬱之發為嘔吐霍亂諸郁之發必從熱化土鬱者中焦濕盛而升降之機乃窒其發也每因吸受暑穢或飲食停滯遂至清濁相干亂成頃刻而為上吐下瀉治法如燃照湯宣土鬱而分陰陽連朴飲祛暑穢而行食滯若驟傷飽食而脘脹脈滑或脈來澀數模糊胸口按之則痛者雖吐猶當以鹽湯探吐吐盡其食然後以駕輕致和等湯調之又云不遠熱則熱至熱至則身熱吐下霍亂此明指霍亂有因熱而成者奈病源三因等書咸謂霍亂本於風冷遂致後人印定眼目凡患熱霍亂者率為藥誤且不遠熱三字亦非但以藥食為言如勞役於長途田野之間則暑邪自外而入所謂熱地如爐傷人最速宜白虎湯六一散之類甘寒以清之或安享乎醇酒膏粱之奉則濕熱自內而生所謂厚味臘毒不節則嗟宜梔豉湯連朴飲之類苦辛以泄之其有暑入傷元白虎湯可以加參氣虛招感用參朮必佐清邪昔賢成法自可比例而施奈昧者妄謂勞傷之病宜補膏粱之體必虛知其一不知其二信手溫補動輒殘生可哀也已至真要大論曰諸熱瞀瘛諸逆衝上諸躁狂越皆屬於火瞀昏悶也瘛抽掣也熱傷神則瞀火迫血則瘛火性炎上故逆而衝上躁煩躁不安也狂狂亂也越失常度也熱盛於外則肢體躁擾熱盛於內則神志煩亂蓋火主動凡病之動者皆屬於火霍亂而見此等證候者皆為熱邪內盛之的據也又曰諸轉反戾水液渾濁諸嘔吐酸暴注下迫皆屬於熱諸轉反戾轉筋拘攣也熱氣燥爍於筋則攣瘛為痛火主燔灼躁動故也水液小便也小便渾濁者天氣熱水渾濁也嘔吐者火氣炎上之象也胃為陽土性主下行胃中熱盛則迫逆而上衝也土爰稼穡而味變酸者肝熱內燔故從而化也暴注卒暴注泄也腸胃熱盛而傳化失常火性疾速故如是也下迫後重裡急迫痛也火性急速而能燥物故也此段經文形容霍亂轉筋證象如繪業醫者必人人讀之何以臨證茫然徒惑於吊腳痧腳麻痧等俗名而貿貿然妄投燥熱之藥以促人天年抑何不思之甚耶千金要方曰中熱霍亂暴利心煩脈數欲得冷水者以新汲井水頓服一升郭白雲曰治霍亂之法惟千金要方最為詳備治暑全書曰暑氣入腹噁心腹痛上吐下瀉瀉如水注春分以後秋分以前少陽相火少陰君火太陰濕土三氣合行其政故天之熱氣下地之濕氣上人在氣交之中受其蒸淫之氣由口鼻入而擾其中遂致升降失司清濁不分所瀉者皆五臟之津液急宜止之然止非通因塞用之謂也濕甚者胃苓湯分利陰陽暑亦自去熱甚者桂苓甘露飲清其暑火濕亦潛消若火盛之體內本無濕而但吸暑邪者白虎湯之類宜之且臟性有陰陽之別陰虛者火旺雖病發之時適犯生冷而橘朴等只宜暫用陽虛者濕勝雖寒潤之品非其所宜如胃苓湯已為合法縱使體極虛羸亦不過補氣清邪並用若因其素稟之虧而忘其現病之暑進以丁附薑桂之劑真殺人不轉睫矣凡傷暑霍亂有身熱煩渴氣粗喘悶而兼厥逆躁擾者慎勿認為陰證但察其小便必黃赤舌苔必黏膩或白厚宜燃照湯澄冷服一劑即現熱象彼時若投薑附藥轉見渾身青紫而死矣甚或手足厥冷少氣唇面爪甲皆青腹痛自汗六脈皆伏而察其吐出酸穢瀉下臭惡小便黃赤熱短或吐下皆系清水而瀉出如火小便點滴或全無者皆是熱伏厥陰也熱極似陰急作地漿煎竹葉石膏湯服之又有吐瀉後身冷如冰脈沉欲絶湯藥不下或發噦亦是熱伏於內醫不能察投藥稍溫愈服愈吐驗其口渴以涼水與之即止後以駕輕湯之類投之脈漸出者生然暑之為病傷之驟則發之暴傷之漸則發之緩故九月時候猶多伏暑霍亂之證醫者不可不知金匱曰轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞矢白散主之劉守真曰轉反戾也熱爍於筋則攣瘛而痛或以為寒客於筋者誤也蓋寒主收引然止為厥逆禁固屈伸不利安得為轉也所謂轉者動也陽動陰靜熱證明矣夫轉筋者多由熱甚霍亂吐利所致以脾胃土衰則肝木自盛而熱爍於筋故轉筋也夫發渴則為熱凡霍亂轉筋而不渴者未之有也尤拙吾曰肝主筋上應風木肝病生風則為轉筋其人臂腳直脈上下行微弦經云諸暴強直皆屬於風也轉筋入腹者脾土虛而肝木乘之也雞為木畜其矢微寒而能祛風濕以利脾氣故取以治是病焉張石頑曰嘔吐泄瀉者濕土之變也轉筋者風木之變也濕土為風木所克則為霍亂轉筋平胃散加木瓜主之有一毫口渴即是伏熱凡朮附薑桂種種燥熱之藥誤服即死雖五苓散之桂亦宜慎用雄案張氏此言可謂先獲我心矣蓋仲聖雖立熱多欲飲水者五苓散主之之法然上文有頭痛惡寒之表證仍是傷寒之霍亂故用兩解之法其雖兼表證而非風寒之邪或本無表證而熱甚口渴者豈可拘泥成法不知變通而徒藉聖人為口實哉透徹古人用法之意是真讀書人語定州楊照藜識薛一瓢曰風自火生火隨風轉乘入陽明則嘔賊及太陰則瀉是名霍亂竄入筋中則攣急流入脈絡則反張是名痙故余曰痙與霍亂同出一源但痙證多厥霍亂少厥蓋痙證風火閉郁鬱則逆勢愈橫不免逼亂神明故多厥霍亂風火外泄泄則邪勢外宣不至循經而走故少厥此痙與霍亂之分別也然痙證邪滯三焦三焦乃火化風得火而愈扇則逼入膻中而暴厥霍亂邪走脾胃脾胃乃濕化邪由濕而停留則淫及諸經而拘攣火鬱則厥火竄則攣又痙與厥之遺禍也痙之攣急乃濕熱生風霍亂之轉筋乃風來勝濕木剋土也痙則由經及臟而厥霍亂則由臟及經而攣總由濕熱與風淆亂清濁升降失常之故夫濕多熱少則風入土中而霍亂熱多濕少則風乘三焦而痙厥厥而不返者死胃液乾枯火邪盤踞也轉筋入腹者死胃液內涸風邪獨徑也然則胃中津液所關顧不巨哉厥證用辛開泄胸中無形之邪也乾霍亂用探吐泄胃中有形之滯也然泄邪而胃液不上升者熱邪益熾探吐而胃液不四布者風邪更張終成死候不可不知雄案霍亂濕多熱少道其常也至於轉筋已風自火出而有勝濕奪津之勢矣余自髫年即見此證流行死亡接踵嗣後留心察勘凡霍亂盛行多在夏熱亢旱酷暑之年則其證必劇自夏末秋初而起直至立冬後始息夫彤彤徂暑濕自何來只緣今人蘊濕者多暑邪易於深伏逮一朝卒發漸至闔戶沿村風行似疫醫者不知原委理中四逆隨手亂投殊可嘆也余每治愈此證必詢其人曰豈未病之先毫無所苦耶或曰病前數日手足心如烙或曰未病之前睹物皆紅如火噫豈非暑熱內伏欲發而先露其機哉智者苟能早為曲突徙薪之計何至燎原莫救乎以胃液之存亡決病情之生死尤為精識昧者肆行燥烈助虐爍津徒讀父書可為痛哭道光元年直省此證大作一覺轉筋即死京師至棺木賣盡以席裹身而葬卒未有識為何證者俗傳食西瓜者即死故西瓜賤甚余時年十一輒與同學者日日飽啖之卒無恙今讀此論則醫學之陋不獨今日為然也素園楊照藜識楊氏之論極是余於是年亦日食西瓜而闔家無染病者即其驗也然是年霍亂間有誤食西瓜而死者為友人董鑄範所親見蓋宜服香薷之證誤信乩壇之語以致寒涼遏抑而斃也是亦不可不知故處方論治非辨證不可本論第二篇治法西瓜汁證法有汗頻二字最的烏程汪曰楨謝城王清任曰道光元年病吐瀉轉筋者數省都中尤甚傷人過多貧不能埋葬者國家發帑施棺月餘間費數十萬金彼時醫工或云陰寒或云火毒余謂不分男婦老少衆人同病即疫也卓識名言或曰既是疫何以芩連薑附亦有或效者余曰芩連效在邪勝之時薑附效在正虛之體亦有服藥終不效必針刺而得愈者試看所流之血盡是紫黑豈不是疫火之毒深入於營分哉以疫邪自口鼻由氣管達於血管將氣血凝結壅塞津門醫林改錯曰幽門之左寸許另有一門名曰津門津門上有一管名曰津管是由胃出精汁水液之道路水不得出故上吐下瀉初得病時宜即用針刺尺澤穴出紫黑血則毒氣外泄矣蓋人身氣管周身貫通血管周身亦貫通尺澤左右四五根血管刺之皆出血皆可愈尺澤上下刺之亦可愈一面針刺一面以解毒活血之藥治之雄案王氏親見臟腑而善針法所論皆鑿鑿可信非懸揣虛擬可比雖用藥非其所長而以解毒活血四字為綱亦具有卓見補亡論曰靈樞五亂之證惟亂於腸胃一證名霍亂故作吐利其餘四證皆不作吐利只謂之亂氣昔柳州之疾蓋亂氣干心之證非霍亂也謂為乾霍亂者雖謬然尚不失為五亂之一今則無復知亂氣之名矣治法匯曰乾霍亂俗名攪腸痧其狀欲吐不吐欲瀉不瀉撩亂揮霍是也急宜探吐得吐方可不吐則死法曰既有其入必有其出今有其入而不得其出者痞塞也多死得吐後方可理氣和中隨證調治醫通曰乾霍亂是土鬱不能發泄火熱內熾陰陽不交之故或問方書皆言宿食與寒氣相搏何以獨指為火耶曰昏亂躁悶非諸躁狂越之屬火者乎每致急死非暴病暴死之屬火者乎但攻之太過則脾愈虛溫之太過則火愈熾寒之太過則反扞格須反佐以治然後火可散耳古法有鹽煎童便非但用之降火且兼取其行血也此證病因非一驟傷飲食者宜探吐宿食為患者宜消導氣鬱感邪者宜宣豁暑火直侵者宜清解諸法並列於後用者審之慮其格拒反佐以治真精語也桂苓甘露飲治熱證而用桂通脈四逆湯治寒證而用豬膽汁皆即此義夢影中治陳嫗一案石膏芩連加細辛少許燃照湯之用蔻仁亦此義也若寒證而用芩連熱證而用薑附則正與病反非反佐之義矣謝城又曰脾胃喜香燥而惡臭濕若素多濕滯而犯臭氣則正氣鬱遏腹痛乃作或上連頭額俱痛或下連腰腿俱痛有痛死不知人少間復蘇者有腹痛不時上攻水漿不入數日不已者甚至欲吐不吐欲瀉不瀉或四肢厥逆面青脈伏或遍體壯熱面紫脈堅俱與生黃豆嚼之覺香甜者是臭毒也急以燒鹽探吐或以童便制香附四五錢為末停湯頓服最效舉世有用水搭肩背及臂者有以苧麻水濕刮之者有以瓷碗油潤刮之者有以瓷鋒針刺委中出血者總欲使腠理開通之意耳其脈多伏或細小緊澀或堅徑搏指中帶促結皆是陰逆陽伏之象不可誤認陰寒而投熱藥雖砂仁之辛溫香竄亦不可輕用若見面青唇黑脈徑搏指厥逆喘促多不可救也又曰觸犯臭穢而腹痛嘔逆刮其脊背隨發紅斑者俗謂之痧甚則欲吐不吐欲瀉不瀉乾嘔㽱痛者曰絞腸痧更有感惡毒異氣而驟發黑痧俗名番痧卒然昏倒腹痛面色黑脹不呼不叫如不急治兩三時即斃有微發寒熱腹痛麻瞀嘔惡神昏者或濈濈汗出或隱隱發斑此毒邪焮發於表也亦有發即瀉利厥逆腹脹無脈者此毒邪內伏不能外發也所患最暴多有不及見斑而死者經謂大氣入於臟腑雖不病而卒死是也初覺先將紙捻點淬頭額即以蕎麥焙燥去殼取末三錢涼開水調服重者少頃再服即安蓋蕎麥能煉腸胃滓穢降氣寬胸而治濁滯為痧毒之專藥其毒甚面黑者急於兩膝後委中穴砭出黑血以泄毒邪凡驟發之病勿慮其虛非此急奪束手待斃原夫此病與臭毒相類與霍亂相似乃疫癘之最劇者初起昏憒不省脈多沉匿不顯或渾渾不清勿以腹痛足冷而與溫藥如蕎麥一時莫得或服之不應即宜理氣為先如香蘇散加薄荷荊芥辛涼透表次則辟邪為要梔子豉湯加牛蒡生甘草解毒和中表熱勢甚清熱為急黃芩湯加連翹木通分利陰陽若見煩擾腹脹脈來數疾急投涼膈散以竹葉易生薑則毒從下奪熱劇神昏雖合三黃多不可救煩渴引飲遺溺速清陽明白虎湯加蔥豉使毒從表化斑點深赤毒在血分者濃煎益母草少投生蜜放溫恣服取效最捷以其專下惡血也或加生萊蔔汁半杯總取散血之功以上諸法在未經誤藥庶可挽回一二曾見一商初到吳會暢飲酣歌席間霎時不安索生薑湯一啜而逝又有朔客到楓覓湯澡浴忽然眩暈嘔逆到舟即斃凡感受暑熱穢疫諸邪者大忌熱湯澡身也更有誤認傷寒而與發散周身焮紫如雲而死者亦有誤認麻疹而與柳柳櫻桃核湯咽痛失音而死者亦有誤認寒證而與熱劑口鼻流血而死者變生反掌不似時行猶可遷延數日也上海特海陬一邑耳二十年來屢遭兵燹乃滄海漸變桑田外國之經營日廣蘇省又以為會垣而江浙之幸免於難者率遷於此各省商舶麇集帆檣林立踵接肩摩居然一大都會矣然人煙繁萃地氣愈熱室廬稠密穢氣愈盛附郭之河藏垢納汙水皆惡濁不堪今夏余避地來遊適霍亂臭毒番痧諸證盛行而臭毒二字切中此地病因奈醫者茫然竟有令人先服薑汁一盞者有以大劑溫補主治者皆刊印遍貼通衢病家信之死者日以千計道殣相望錢塘吳菊潭茂才告余曰目擊一人七竅流血而死聞之惻然豈亦劫運使然歟玉衡曰先吐瀉而心腹㽱痛者從穢氣而發者多先心腹㽱痛而吐瀉者從暑氣而發者多然吐瀉之霍亂乃暑穢傷人氣分宜用油鹽刮其皮膚則痧不內攻若心胸脹悶腹中㽱痛或如板硬或如繩縛或如筋吊或如錐刺刀刲雖痛極而不吐瀉者名乾霍亂乃邪已入營宜以針刺出血則毒有所泄然後再審其因而藥之若痧脹已極難於刮刺者又必先以藥救醒乃可以回生明此三法庶可十全王晉三曰痧者寒熱之濕氣皆可以為患或四時寒濕凝滯於脈絡或夏月濕熱郁遏於經隧或鼻聞臭氣而阻逆經氣或內因停積而壅塞腑氣則胃脘氣逆皆能脹滿作痛甚至昏憒欲死西北人以楊柳枝蘸熱水鞭其腹謂之打寒痧東南人以油碗或油線刮其胸背手足內胻謂之刮痧以碗鋒及扁針刺舌下指尖及曲池委中出血謂之槊痧更服玉樞丹等以治其內是皆內外達竅以泄其氣則氣血得以循度而行其脹即已實即霍亂耳非另有痧邪也雄案方書從無痧證之名惟乾霍亂有俗呼絞腸痧者是世俗之有痧不知起於何時也至醫説始載葉氏用蠶蛻紙治痧之法以蠶性豁痰祛風利竅其紙已經鹽醃而順下最速也乃江民瑩誤為解㑊證雖為杭堇浦所譏然亦可見從前痧證不多故古人皆略而不詳也逮國初時其病漸盛自北而南所以又有滿洲病與番痧之名郭氏因龔雲林青筋之説而著痧脹玉衡一書推原極變其説甚辨而痧之證治乃備石頑復分臭毒番痧為二者謂惡毒癘氣尤甚於穢邪也晉三又辨痧即外邪驟入阻塞其正氣流行之道之謂而痧之病義益明至情志多郁之人稍犯涼熱即能成痧且不時舉發亦由氣血失其宣暢也右陶雖有截痧方而用藥殊乖江氏以香附芩梔撫芎為劑較為合法其諸痧名狀玉衡書具在不多贅長洲龍青霏脈學聯珠云痧脹之證多屬奇經蓋奇經為十二經之支流也五臟之清氣不升六腑之濁氣不降譬猶五湖四瀆漫溢泛濫盡入江河而清濁已混更水甚土崩泥沙渾擾流蕩不清井腧壅塞故其病有痧脹之名痧脹者猶沙漲也總由十二經清濁不分流溢入奇經而奇經脈現則為痧證也邪氣滯於經絡與臟腑無涉不當徒以藥味攻臟腑宜先用提刮之法及刺法使經絡既通然後用藥始堪應手也雄案此説似創而實確然經絡既通雖不藥可愈特慮邪已漸及腑臟則刮刺不足了事譬如險要為賊所據不可徒講防堵也疫疹一得曰凡初起六脈細數沉伏面色青慘昏憒如迷四肢逆冷頭汗如雨其痛如劈腹內攪痛欲吐不吐欲瀉不瀉此為悶疫斃不終朝悶者熱毒深伏於內而不能發越於外也漸伏漸深入臟而死不俟終日也至於治法宜刺曲池委中以泄營分之毒再灌以紫雪清透伏邪使其外達或可挽回也治法精良素園寒證素問氣交變大論曰歲土不及民病飧泄霍亂歲土不及則脾胃素虛之人因天運而更見其虛中陽既虛寒濕自盛以致朝食暮瀉而為飧泄甚加嘔吐而為霍亂觀其與飧泄並稱則知利者必是清穀而非臭穢吐者亦必澄徹而非酸濁小便之利口之不渴又從而可必矣如此才是寒濕霍亂可以理中五苓之類治之故讀書須以意逆其理自然觸處洞然無往而不貫矣且寒霍亂多見於安逸之人以其深居靜處陽氣不伸坐臥風涼起居任意冰瓜水果恣食為常雖在盛夏之時所患多非暑病王安道論之詳矣輕則藿香正氣散或平胃加木香藿香生薑半夏之類濕盛而四肢重著骨節煩痛者胃苓湯加木香藿香大腹皮之類七情鬱結寒食停滯者厚朴湯治中湯頭痛惡寒無汗者香薷飲先解其表隨以大順散調其里如果脈弱陽虛腹痛喜得溫按瀉出不臭者來復丹若吐瀉不止元氣耗散或水粒不入或口渴喜冷而不多飲或惡寒戰栗手足厥冷或煩熱發躁揭去衣被但察其瀉出不臭者乃內虛陰盛格陽宜理中湯甚則四逆湯加食鹽少許更有暴瀉如水冷汗四逆脈弱不能言者急進漿水散救之並宜冷服然此輩實由避暑而反為寒傷致病若拘泥時令誤投清暑之劑而更助其陰則頃刻亡陽莫挽矣前人有治此證而愈者尚未確知其為寒病也遂謂夏月暑病通宜熱藥妄立陰暑名目貽誤後人此因偶中而錯認面目也余於溫熱經緯辨之詳矣至真要大論曰諸病水液澄徹清冷皆屬於寒或曰醫者精脈理諳藥性胸羅經史口熟方書斯可以濟世矣余曰不可必也能辨證乎苟不辨證而但憑脈以用方藥雖引古證今有典有則恐不免為二豎所笑也惟聖人早料及此以辨證之法大書特書垂示後世可謂既詳且盡豈但為霍亂分寒熱哉傷寒論曰霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之此霍亂之因傷寒而致者故兼有頭痛發熱身痛諸表證也雖欲飲水而表證未罷故以五苓散為兩解之法二方皆為風寒而設熱多謂表熱未衰寒多謂裡寒較盛於一病中察其內外之輕重而辨邪氣之聚散以施治法聖人辨證詳盡如是而後人顢頇或至誤會凡夏秋熱霍亂之口渴者輒用五苓多致僨事須知桂術為渴家所忌惟風寒之邪郁阻氣機至水液不行而渴者始可用以行氣化水也分析甚明發前人所未發蓋熱多並非表裡大熱欲飲水亦與大渴引飲不同也謝城又曰吐利止而身痛不休者當消息和解其外宜桂枝湯小和之吐利止里已和也身痛不休者表未解也故須桂枝和解其外所謂表病里和汗之則愈也但此為寒霍亂後之兼有風寒表邪者而言若溫熱暑疫霍亂後之表未解者不得率爾引用也余擬駕輕湯一方最為合治然其意亦不敢出聖人之範圍也詳其一曰消息再曰小和之者蓋以吐利之餘裡氣已傷故必消息其可汗而汗之亦不可大汗而小和之也況熱霍亂後津液尤虛者其可妄施汗法乎故余但以輕清為制也又曰吐利發汗脈平小煩者以新虛不勝穀氣故也吐利可發汗者傷寒霍亂也脈平為邪已解而小煩者以吐下後胃氣新虛不能消穀故霍亂病晬時內不可便與飲食必待胃漸下行為順而倉廩始開也暑熱霍亂尤奪胃津溉以甘涼自能思谷先曾祖秉衡公曰傷寒外感之總名傷寒論統論外感之書也先大父永嘉公曰難經云傷寒有五則五種外感古人皆謂之傷寒矣傷寒論有治風治溫治暍治濕諸法則非專論一傷寒矣楊素園大尹曰注傷寒者無慮數十家皆以為專論傷寒之書故恆覺支離附會不適於用雄嘗謂傷寒有五瘧亦有五不過重輕之別耳傷寒惟感寒即病者為正傷寒乃寒邪由表而受治宜溫散其邪在半表半裡或所感邪氣較輕不為傷寒而為正瘧者脈象必弦並宜和解設冬傷於寒而不即病則為春溫夏熱之病其較輕者則為溫瘧疸瘧若感受風溫濕溫暑熱之氣者重則為時感輕則為時瘧今世溫熱多而傷寒少故瘧亦時瘧多而正瘧少惟葉天士先生精於溫熱暑濕諸感故其治瘧也一以貫之余師其意凡治時瘧必辨其為風溫為濕溫為暑熱為伏邪者仍以時感法清其源故四十年來治瘧無難愈之證推而廣之仍不止瘧疾爾也如風寒暑濕皆可以為霍亂則冬寒內伏至春夏不為溫熱病亦可以為霍亂也特不多見故從來無人道及今年春夏之交余在濮院即有是證未交芒種薄遊海上則沿門闔戶已成大疫蓋去冬積雪久凍傷於寒者較深而流離失所鬥米千餘精神之不藏者既多中氣之不餒者亦罕且今春過冷入夏甚涼殆肅殺之氣未消發生之機不暢故伏邪不能因升發之令外泄以為溫久伏深藏如姦匪潛匿毫無覺察或其人起居飲食之失調或外感稍侵而引動遂得乘機卒發直犯中樞而為霍亂故多無腹痛之兼證而愈後輒有餘波與向來夏秋所行因於暑濕為患者證候則一病情迥殊也治法亦稍有不同然伏邪化熱自里達外與伏暑內發理無二致故其人必口渴而刺血則紫黑不知者以為暑令未行有何熱證放膽薑附塗炭生民豈亦劫運使然耶可哀也已鎮海周君採山極為折服遂以此説刊印傳播遠近元和金君簠齋同邑周君二郊秀水呂君慎庵鳥程汪謝城孝廉桐鄉陸定圃進士皆見而韙之爰贅於傷寒霍亂後以諗來者又曰吐利汗出發熱惡寒四肢拘急手足厥逆者四逆湯主之此陽虛之體寒邪得以直入而為霍亂也發熱惡寒者身雖熱而惡寒身熱為格陽之假象惡寒為虛冷之真諦也四肢拘急手足厥逆者陽氣衰少不柔於筋不溫於四末也首重汗出者為陽有外亡之象故徑用四逆湯祛其既入之寒而挽其將去之陽若止見厥逆惡寒四肢拘急脈來沉細沉緊面如塵土瀉出不臭雖屬陰寒而無汗出之候者但宜冷香飲子治之寒主收引故四肢拘急乃筋強不能屈伸之謂與熱證之轉筋迥殊監證極宜分別苟或顛倒誤施禍不旋踵又曰既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之此亦虛冷霍亂之候四肢拘急手足厥逆虛冷之著於外也下利清穀脈微欲絶虛冷之著於內也虛冷甚於內則反逼其陽於外矣故其外候每多假熱之象或煩躁去衣而欲坐地或面赤喜冷而不欲咽或脈大虛弦而不任按是皆元氣耗散虛陽失守甚加喘噦最為危險惟四逆湯可以驅內勝之陰而復外散之陽但既吐且利之下緊接曰小便復利重申曰下利清穀何其丁寧而鄭重耶故讀者最宜著眼洄溪所謂一證不具即當細審也倘熱霍亂因暑邪深入而滯其經隧顯脈細肢寒之假象者必有溺赤便臭口渴苔黃之真諦臨診慎毋忽焉又曰吐下已斷汗出而厥四肢拘急脈微欲絶者通脈四逆加豬膽湯主之尤拙吾曰吐下已止陽氣當復陰邪當解乃汗出而厥四肢拘急而又脈微欲絶則陰無退散之期陽有散亡之象於法為較危矣故於四逆加乾薑一倍以救欲絶之陽而又慮溫熱之過反為陰氣格拒而不入故加豬膽汁之苦寒以為嚮導之用即內經盛者從之之意也又曰少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之少陰病吐利煩躁四逆者死寒中少陰吐利交作陰邪盛極而陽氣不勝也然先厥冷而後煩躁者猶有陽欲復而來爭之兆故以吳茱萸溫里散寒人參大棗益虛安中為治也若先煩躁而後四逆者陽不勝而將絶也故死此二條本少陰中寒非霍亂也然有類乎霍亂既明霍亂之治復列其類證以廣其例俾臨證不致眩惑也又曰少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯寒邪化熱傳入少陰逼迫津水注為自利質清而無滓穢相雜色青而無黃赤相間可見陽邪暴虐之極反與陰邪無異但陽邪傳自上焦其人心下必痛口必乾燥設系陰邪則心下滿而不痛口中和而不渴必無此枯稿之象故宜急下以救其陰也夫既列少陰中寒二條於前以明霍亂類證之治更附少陰急下一條於此者以病系傷寒逮既化熱雖見脈微細但欲寐之少陰證而口乾燥心下痛自利清水尚宜急下其病非傷寒脈不微細精情瞀亂而口渴心下拒按之霍亂證顧可以燥熱藥治之哉內經以水液澄徹清冷為寒此證雖自利清水必熱而不冷或小便赤短審問之自有分別而仲聖於下利證專以口渴與否判清溫之治尤為簡當臨證者當奉為南針也此證最宜細辨余嘗見一霍亂輕證醫投涼膈散次日下血而殞謝城千金要方曰霍亂四逆吐少嘔多者附子粳米湯主之治中湯治霍亂吐下脹滿食不消化心腹痛病源曰霍亂者由人溫涼不調陰陽清濁二氣有相干亂之時其亂於腸胃之間者因飲食而變發則心腹㽱痛其有先心痛者先吐先腹痛者先利心腹並痛者則吐利俱發挾風而實者身發熱頭痛體痛而復吐利虛者但吐利心腹刺痛而已亦有飲酒食肉腥膾生冷過度因居處不節或露臥濕地或當風取涼而風冷之氣歸於三焦傳於脾胃脾胃得冷則不磨不磨則水穀不消化亦令清濁二氣相干脾胃虛弱便作吐利水穀不消則心腹脹滿皆成霍亂熱霍亂流行似疫世之所同也寒霍亂偶有所傷人之所獨也巢氏所論雖詳乃尋常寒霍亂耳執此以治時行霍亂猶腐儒將兵其不覆敗者鮮矣又曰霍亂而轉筋者由冷氣入於筋故也冷入於足之三陰三陽則腳轉筋入於手之三陰三陽則手轉筋隨冷所入之筋筋即轉轉者皆由邪冷之氣擊動其筋而移轉也轉筋有因熱因寒之異須合兼證脈候而辨析之無病之人亦有時患轉筋者不過足受微涼不足為病乃時醫專以轉筋為邪入三陰詎知三陽亦能轉筋巢氏之論甚明乎謝城又曰乾霍亂者是冷氣搏於腸胃致飲食不消但腹滿煩亂㽱痛短氣其腸胃先挾實故不吐利名為乾霍亂也乾霍亂屬寒濕者固有之挾食者亦或有之亦有因寒濕而夾穢臭惡毒之氣者故治法審非暑火為患不可誤用清涼但宜芳香辛散以宣通之其薑附椒巴等劑勿輕信而妄試也醫道通治道治國者必察民情聽訟者必察獄情用藥如用兵為將者必察敵情為醫者必察病情民情得而政教行獄情得而曲直分敵情得則勝權獨操可以寡克衆可以逸待勞病情得則生機在握可以御沴癘可以挽造化嗚呼不辨虛實寒熱而治霍亂者猶之棄其土地人民而講戰守也故列病情第一治法篇第二伐毛霍亂及痧脹疫癘諸惡證初起即解散其發細看如有赤色者急拔去之再脫其衣細看胸背如有長毛數莖必盡拔之熱毒深入營分發為血之餘毒焰上炎故見赤色甚至硬如駿鬣余嘗目擊之宗侄承烈紹武取嚏霍亂諸痧皆由正氣為邪氣所阻故濁氣不能呼出清氣不能吸入而氣亂於中遂成閉塞之證濁氣最熱泰西人謂之炭氣炭氣不出人即昏悶而死然呼出肺主之肺開竅於鼻用皂角末或通關散或痧藥吹入鼻中取嚏以通氣道則邪氣外泄濁氣可出病自松也刮法取嚏不論有無隨繼以刮有嚏者肺氣雖開恐營衛氣機尚痹當刮以宣之無嚏者肺既不開尤必刮松衛氣使已入營分之邪時以外泄而病可松也故肩頸脊背胸前脅肋兩肋臂兩膝灣等處皆宜用綿紗線或苧麻繩或青線或瓷碗口蘸菜油自上向下刮之以紅紫色綻方止項下及大小腹軟肉處以食鹽研細用手擦之或以指蘸清水撮之景嶽云凡毒深病急者非刮背不可以五臟之系咸附於背也或以鹽擦背亦可淬法營衛之氣為邪氣所阻而不流通則手足厥冷而腹痛身有紅點而隱約此名斑痧亦曰番痧俗以其厥冷謂之陰痧者謬也宜以燈心微蘸油點火淬之以燈火近肉即提起煏煿有聲病即松刺法玉衡曰東南卑濕利用砭以針刺放毒血即用砭之道也凡霍亂痧脹邪已入營必刺出毒血俾邪得外泄然後據證用藥可以望生第一宜刺少商穴刺時扶病人坐直男左女右用力將其手臂從上捋下捋其惡血聚於指頭以油頭繩扎住寸口用尖鋭銀針在大指甲向里如韭葉許刺之擠出毒血即松重者兩手並刺若神昏不醒刮刺不松者為邪入心包絡獲撑開病人之口看舌底有黑筋三股男左女右用竹箸嵌瓷鋒刺出惡血一點兩臂灣名曲池穴兩膝灣名委中穴以手蘸溫水拍之露出青筋紅筋若肌膚白皙者則露紫筋皆痧筋也並用銀針刺出紫黑毒血其腿上大筋不可刺刺亦無毒血反令人心煩腿兩邊硬筋上筋不可刺刺之恐令人筋吊案談往云崇禎十六年有疙瘩瘟羊毛瘟等疫呼病即亡不留片刻八九兩月死者數百萬十月間有閩人曉解病由看膝灣後有筋突起紫者無救紅則速刺出血可活至霜雪漸繁勢始漸殺余謂此疫雖奇殺人即速且多然無非暑熱毒氣深入於絡耳故輕者刺之可活而霜雪繁病自衰也考嘉興王肱枕蚓庵瑣語及桐鄉陳松濤災荒記事皆云崇禎十四年大旱十五十六經年亢旱通國奇荒疫癘大作合三書而觀之其為暑燥熱毒之邪深入營分無疑矣故委中之筋已突起不待拍之而始露詳載之以為留心民命者告玉衡又云一應刺法不過針鋒微微入肉不必深入又以諸穴非親見不明白故不具載而故人管榮棠謂余曰曩遇桐鄉八十老人張德祥者善治痧數十年來生死決其針下百不失一凡針入而肌肉凝閉者必不得生然其所刺部位不僅郭氏所言之十處惜世罕知也據云痧證頭暈者刺素髎穴在鼻柱上端準頭針入一寸頭痛者刺風府穴在項後入髮際一寸大筋內宛宛中針入一寸偏痛者刺風池穴在耳後顳顬後腦空下髮際陷中針入一寸腹痛而吐者刺上脘穴在臍上五寸針入一寸腹痛而瀉者刺下脘穴在臍上二寸針入一寸腹痛而欲吐不吐欲瀉不瀉者刺中脘穴在臍上四寸針入一寸即愈以上三穴須用手竭力提起其皮而刺切記以上六穴並不出血手瘛者刺少商穴在手次指內側去爪甲如韭葉出血立已足吊者刺厲兌穴在足次趾之端去爪甲如韭葉出血立已刺承筋穴在脛後足跟上七寸出血立已刺承山穴在腿肚下分肉間出血立已但此穴非精明者不易取宜慎刺牙關緊閉者刺人迎穴在結喉兩旁一寸五分大動脈應手處刺之立開按張叟刺法必有所授榮棠得其傳故針痧極神且榮棠之為人也好善而率直非牟利妄語者流故余甚信之嘗刊入業書今備録此篇以便窮鄉僻壤皆可按證而施治也又轉筋證治云凡心口腰脊腎俞穴等處切勿誤聽愚人妄施針刺親見一人因心口一針立時隕命不可不知拓洗生大蒜杵爛貼兩足心吳茱萸一兩研末鹽滷和塗兩足心辣蓼草八兩杵爛木瓜四兩老酒二斤加水煎乘熱揩尉患處及手足遍身辣蓼草乃水紅花之別一種葉狹小而光兩面皆緑梗微赤有節其味甚辛合六神麯及造酒麴皆用之雞生蝨但以此草置雞棲內即愈鹽滷頓熱淋洗並以手蘸摩擦其患處如無鹽滷作極鹹鹽湯可代也案鹽散風火化濕熱平人常用鹽滷濯足永無足疾若路途患此倒地者但以病人兩腳浸溺桶中亦妙綿絮浸酒中煎滾取出乘熱裹患處或以燒酒摩擦其患處以軟散為度燒酒內入斑蝥末力更勝也腳不冷者但以鹽研細擦之水煎青布拓腳膝冷即易之柏葉杵爛裹之並煎湯淋洗尉灸主霍亂轉筋乾霍亂之屬寒者炒鹽一包尉其心腹令氣透又以一包尉其背待手足暖再服神香散一錢寒重者再服方見四篇或以吳茱萸食鹽各數兩炒熱包尉臍下亦妙或以芥子研末和塗臍上胡椒七粒以布包之嚼碎納臍中用膏藥封之再以熱手按之蓋被臥少頃腹中熱有汗則寒邪散矣甚者用回陽膏貼臍間方見四篇或以鹽填臍中上蓋蒜片艾灸二七壯危甚者再灸臍兩旁各開二寸之天樞二穴臍上四寸中脘一穴臍下寸半氣海一穴外臺法以手挽所患腳大拇趾當腳心急筋上灸七壯喻氏法凡卒中陰寒厥逆吐瀉色清氣冷凜冽無汗者用蔥一大握以帶束緊切去兩頭留白寸許以一面尉熱安臍上用尉斗盛炭火尉蔥上面俾熱氣從臍入腹甚者連尉二三餅又甚者再用艾炷灸關元氣海各二三十壯若腠理素疏陰盛逼陽而多汗者用附子乾薑回陽之不暇尚可尉灼以助其散越乎嘗讀仲聖傷寒論知病屬陰虛血少者概不可灸必陽虛氣弱者始可用灸今喻氏復辨陽虛者固宜用灸若陽虛至於外越者豈容再灸是亦發人所未發可補長沙之未及矣世之不別陰陽而妄施灼灸以傷人者豈特霍亂為然乎籲可嘆已又案凡腹雖痛極而喜得溫按唇口刮白者乃內虛陰寒之病宜用火灸切忌針刺若四肢雖冷而苦渴苔膩腹痛雖甚而睛赤唇紅或煩躁喜涼者乃熱鬱氣閉之證急宜刺血切忌火攻設不辨明而誤用之禍皆反掌偵探生黃豆細嚼不腥者痧也既可試病亦解痧毒生芋亦可大赤雄雞一隻放病人腹上以雞口朝其面雞即伏而不動痛止雞自跳下亦治尸厥中惡神清而嚼薑不辣者真寒證也策應新汲井水百沸天泉各半和服名陰陽水瀕湖曰上焦主納中焦腐化下焦主出三焦通利陰陽調和升降周流則臟腑暢達一失其道二氣淆亂濁陰不降清陽不升故發為霍亂吐利之病飲此即定者分其陰陽使得其平也案汲井泉以上升天雨水而下降故汲者宜新而降者宜熟也以之煎瘧疾藥蓋取分解寒熱之邪而和其陰陽也東壁土煎汁飲聖濟鍋底墨煤灶突上墨煤各五分百沸湯急攪數千下以碗覆之通口服一二口經驗生扁豆研末入醋少許新汲水和服普濟絲瓜絡一斤白霜梅肉一錢並核中仁用共研爛新汲水調服廣筆記梨樹枝煎汁服聖惠海桐皮煎汁飲聖濟路旁破草鞋去兩頭洗三四次水煎服事海文山生藕搗汁飲聖惠陳倉米煮清湯稍稍飲之治霍亂大渴永類鈐方冬瓜水煮清湯俟涼飲之半癡案陳倉米雖云清熱止渴惟霍亂已止者服之為宜若邪勢方張吐下未平之際尚嫌其守冬瓜甘淡微涼極清暑濕無論病前病後用以代飲妙不可言即溫濕暑疫瀉痢諸病皆可用也蘆根麥冬水煎服千金案單用蘆根煎飲亦止煩渴或與竹葉同煎更佳梨肉煮湯服渴甚搗汁飲夢隱萊蔔煮湯服或生嚼咽汁吐去渣夢隱生緑豆急火煎清湯涼服夢隱枇杷葉刷去毛濃煎徐飲此方不但解霍亂之渴也若深冬採之刷毛洗淨切碎淨鍋炒乾瓷缸密收常以代茗可杜暑濕時疫及噎利諸病夢隱以下治霍亂轉筋雄雞矢白臘月收之為末水和溫服金匱地漿掘乾淨地作坎深三尺以新汲井水沃入攪之少頃取清者飲三五杯千金案羅謙甫云霍亂乃暑熱內傷七神迷亂所致陰氣靜則神藏躁則消亡非至陰之氣不愈坤為地屬陰土曰靜順地漿作於陰地坎中為陰中之陰能瀉陽中之陽也愚謂得羅氏此言治霍亂已思過半矣蔣式玉稱其勤求古訓洵不誣也新汲井水徐徐冷飲之外以一盆盛水浸兩足忌食熱物救急良方案果系暑熱熾盛用臘雪水尤勝扁豆葉一握搗絞汁一碗飲廣筆記桑葉一握煎汁服聖惠木瓜一兩水煎服余湯浸青布裹其腓本方加桑葉七片尤良聖惠龍腦薄荷煎湯飲聖惠案有汗者此方勿服青錢四十九枚木瓜一兩烏梅炒五個水二盞煎分溫服聖濟案此方專治風木行脾之證時行重感非所宜也鹽梅煎湯細細飲如宜方案方義與上同垂死者用敗蒲席一握切漿水一盞煎服聖惠原蠶沙一兩陰陽水煎澄清溫服夢隱案蠶沙乃桑葉所化夫桑葉主息風化濕故聖惠方以之治霍亂轉筋也既經蠶食蠶亦主勝風去濕且蠶僵而不腐得清氣於造物者獨純故其矢不臭不變色殆桑從蠶化雖走濁道而清氣獨全金匱以雞矢治霍亂轉筋者雞屬巽雖不溺而矢獨干亦取其勝風濕以領濁氣下趨也蠶沙既引濁下趨又能化濁使之歸清性較雞矢更優故余用以為霍亂轉筋之主藥頗奏膚功嗣見治痧飛龍奪命丹用人中白一味領諸藥迅掃濁邪下趨陰竅較他方之藉硝以達下者更覺貼切故奏效尤捷制方之義可謂精矣至來復丹之用五靈脂亦從雞矢白脫苔也霍亂轉筋大渴苔黃汗頻無溺者西瓜絞汁飲夢隱凡陽氣遏抑在內雖熱證亦無汗西瓜汁當慎用此特標汗頻二字最確當謝城渴而氣機不舒者金銀花蒲公英絲瓜葉絲瓜並可搗汁服或用乾者煎湯亦得夢隱渴而膚有赤色者益母草或紫花地丁搗汁飲或以乾者煎湯服亦可夢隱案紫花地丁亦名如意草主清血熱生嚼之味甘不作草氣故可同諸草木葉咀食充飢悉無草氣洵救荒之仙草也附及之以為世告以下治乾霍亂蕎麥焙燥去殼取末三錢涼開水調服簡便方梔子二七枚燒研酒調下肘後鹽一撮放刀上用火炙透熱童便和服或以新汲水和服少頃即得吐下而氣通矣柳州益母草一兩煎湯少投生蜜俟溫服醫通馬蘭根細嚼咽汁壽域劉寄奴煎湯溫服聖濟桃葉煎湯溫服外臺石菖蒲一兩杵汁和水服聖惠煙管中油俗呼煙油取豆大一丸放病人口內掬水灌之下咽即活有堂蕪菁子煮汁飲集簡黑大豆生研水服方寸匕普濟案今人以黃豆試痧本此垂危者用生芋一片放入病人口內咽汁即蘇蘇後再吃幾片取其寬腸去垢濁破血清痧毒也世傳飲油吞礬二方取其引吐澄濁也然油滋膩礬兜澀皆有流弊吾不取也普洱茶濃煎溫服夢隱淡海蛇四兩鳧茈即荸薺一名地栗二兩切水煮至海蛇煬取汁溫服夢隱萊蔔搗汁飲夢隱雄鼠矢陰陽水下二七枚夢隱案經驗方有馬矢絞汁治乾霍亂一方雖取義燥濕降濁然臭味惡劣徑以穢汁灌人亦覺難堪易以鼠矢較近人情其功似亦稍勝也按馬矢燒灰存性名獨勝散治絞腸痧證服下即瘥彼所謂臭味惡劣未經燒灰故耳萊蔔葉冬月挂樹上或攤屋上直至春前乾燥極透時收入淨壇密貯每一兩洗淨水煎溫服夢隱案此味並治時行喉證諸般外感瘧痢泄瀉疳膨黃疸水腫腳氣諸病如神物易功多價廉無損家家可備以濟世也稻稈濃煎溫服夢隱六一散方見四篇新汲水調下三錢河間以下皆治邪深入絡以及干藏之乾霍亂霍亂轉筋紫雪方見四篇下同碧雪絳雪一名紅靈散行軍散玉樞丹紫金丹飛龍奪命丹與外科飛龍奪命丹名同藥異外科之方用蜈蚣為君蜈蚣一名天龍能飛而制蛇因以名方治痧之方用許多寶貴香靈之品藉人中白駕輕就熟為使力能迅掃穢惡之邪下趨濁道有馬到功成之捷效以駿馬有飛行之號故以名方案以上諸方皆有起死回生之力惟有力者卒不易得無力者貴不易購苟能量力合送或集資廣濟洵造福無涯矣以下治寒濕乾霍亂陳艾葉煎湯服外臺紫蘇搗汁服乾者煎飲肘後案此方治因食魚蟹諸水族而腹痛吐利者皆效橘紅藿香各五錢煎服百一選方薤白煮湯服獨行方薑炙厚朴研溫湯服三錢挾暑者新汲水下聖惠丁香十四枚研末沸湯和服千金案此治食蟹及水果太多而痛瀉者並效真神麯三錢水煎溫服夢隱吳茱萸二七枚砂仁一錢研泡湯吞下夢隱伽南香涼開水磨取三分沸湯點服夢隱以下皆治陰寒霍亂三聖丹方見四篇下同速效丹蟾酥丸姚氏蟾酥丸霹靂散回陽膏以上數方亦須預備應用如合送濟人須將病情敘明庶免貽誤霍亂轉筋吐下已多脈無氣短大汗欲脫者置好醋二三斤於病人面前將鐵器燒紅頻淬醋內使聞其氣即可轉危為安足冷者並搗生附子二兩貼於湧泉穴再按證用藥以挽回元氣不論寒熱二證凡元氣欲脫者皆當亟用余屢試多驗並治産後昏暈及諸病之神魂不安者皆效紀律一忌米湯得谷者昌百病之生死判於胃氣之存亡猶之兵家餉道最為要事惟時邪霍亂痧脹獨不然者以暑濕穢惡之邪由口鼻吸入肺胃而阻其氣道之流行乃痞塞不通之病故濁不能降而腹痛嘔吐清不能升而泄瀉無嚏或欲吐不吐欲瀉不瀉而竊踞中樞苟不亟為展化宣通邪必由經入絡由腑入臟而滋蔓難圖矣凡周時內一口米湯下咽即脹逆不可救者正以穀氣入胃長氣於陽況煮成湯液尤能閉滯隧絡何異資寇兵而齎盜糧哉惟吐瀉已多邪衰正奪者猶之寇去民窮正宜撫恤須以清米湯溫飲之以為接續不可禁之太過反致胃氣難復知所先後則近道矣物性中和莫如谷矣為生人之至寶乃霍亂痧脹邪熱方張之際不可一試米湯如是況補藥乎其霍亂間有得溫補而愈者是中虛之霍亂非時行之霍亂也須知中不必皆虛虛不必同時而病病不必皆成霍亂既同時而病霍亂豈非外邪為患而流行漸廣遂成疫癘何司命者尚不識其病情耶凡一病有一病之宜忌先議病後議藥中病即是良藥故投之而當硝黃即是補藥投而不當參朮皆為毒藥譬如酒色財氣庸人以之殺生而英雄或以之展抱負禮樂文章聖人以之經世而豎儒反以之誤蒼生藥之於醫也亦然補偏救弊隨時而中病無定情藥無定性顧可舍病而徒以藥之純駁為良毒哉或云扶陽抑陰治世之道古聖以之立教景嶽以之喻醫今人身不治病亂於中竟闢溫補扶陽惟事清解助陰毋乃偏任寒涼將起後人之議乎余曰扶陽抑陰大易原以喻君子小人故章虛谷謂但可以論治世不可以論治病惜章氏尚一間未達也夫人身元氣猶陽也外來邪氣猶陰也扶正抑邪豈必專藉熱藥哉如熱傷胃液仲聖謂之無陽矣然欲扶其陽必充其液欲抑其陰須撤其熱雖急下曰存陰而急下者下邪也下邪即是抑陰存陰者存正也存正即是扶陽苟知此義則易理醫理原一貫也設但泥溫補為扶陽之藥而不知陰陽乃邪正之喻雖滿腹經綸無非是蒼生之羅網治人治世無二致也或又曰丹溪謂人身陰不足景嶽謂人身陽不足君以為孰是余謂人身一小天地試以天地之理論之陰陽本兩平而無偏也故寒與暑為對待晝與夜為對待然雨露之滋霜雪之降皆所以佐陰之不足而制陽之有餘明乎此則朱張之是非判矣或又曰子言扶正即是扶陽則補陰補陽皆扶陽也抑陰即是抑邪則逐寒逐熱皆抑陰也顧專事逐邪不崇補正得毋未合扶陽抑陰之旨乎余因述先慈之訓以答曰無論外感不可妄投溫補即內傷證必求其所傷何病而先治其傷則病去而元自復古人不曰內虛而曰內傷顧名思義則純虛之證殊少也徐洄溪亦云大凡人非老死即病死其無病而虛死者千不得一況病去則虛者亦生病留則實者亦死故去病正以扶陽也余嘗謂人氣以成形耳法天行健原無一息之停惟五氣外侵或七情內擾氣機愆度疾病乃生故雖在極虛之人既病即為虛中有實即酷暑嚴寒人所共受而有病有不病者不盡關乎老少強弱也以身中之氣有愆有不愆也愆則邪留著而為病不愆則氣默運以潛消調其愆而使之不愆治外感內傷諸病無餘蘊矣霍亂云乎哉不惜傾筐倒篋而出之嘉惠後學之心至矣讀此而猶不悟請勿從事於此道也隨園云人之氣血有塞滯之處則其壯者為癰疽而其弱者為勞瘵余嘗佩服以為名言今讀此論與二語正相合定州楊照藜素園或又曰經言邪之所湊其氣必虛亦不然乎曰人身氣血原有強弱強者未必皆壽弱者未必皆夭正以氣血雖強設為邪湊而流行愆度似乎虛矣不去其邪則病愈實而正愈虛馴致於死雖強而夭折矣氣血雖弱不為邪湊則流行不愆不覺其虛即為邪湊但去其邪則病不留而正自安雖弱亦得盡其天年矣使看勇如賁育之人身軀不覺其重大者以正氣健行不息也卒受痧邪亦遂肢冷脈伏告斃者以氣為邪閉而血肉即死也所謂邪之所湊其氣必虛者當作如是解凡治此證者將急開其閉以宣通乎抑從而下石更投補塞乎不但痧證爾也凡病未去而補之則病處愈實未病處必愈虛以未病處之氣血皆挹而注於病處也蓋所謂補藥者非能無中生有以增益人身氣血也不過具衰多益寡挹彼注此之能耳平人服之尚滋流斃況病人乎故經言不能治其虛焉問其餘夫既虛矣尚曰治而不曰補可不深維其義乎不但治人爾也治家者若以積財為務有入而無出甚則坎土穴牆以藏埋之是故一人小積則受其貧者百家一人大積則受其貧者萬家雖然吝者之積財以為久聚而不散矣禍災之來兵寇之攻取百年之財一日而盡之安見其果不出也治國者若以積財為務必至四海困窮天祿永終是天下之財源如人身之氣血俾得流通灌注病自何來故因論霍亂而並及之吾叔於道光間輯裕後須知書以勵末俗因採魏昭伯奢吝説一條頗招訾議詎十餘年來其言輒應可慨也已至於治虛尤獨擅一時憶丁巳春烈年二十七在上海患吐血諸醫用清火補陰等藥久治不瘥勢瀕於殆返杭求診投大劑參耆數服而痊迄今無恙且茁實勝於曩時雖流離播越尚能勝任也今讀此論謹書以識感佩之忱紹武今夏先生來申適謨患身熱便瀉口乾幸能納食仍強起任事先生察脈弦大曰此憂勞過甚元氣大虧之證也投大劑參朮苓草防芍橘斛木瓜旬日而痊即旋里省親逾月抵滬患寒熱先生視為暑濕類瘧授清化藥四貼霍然但覺疲憊仍以參耆甘柏等峻補而瘳治虛獨擅一時豈不信哉歸安陳廷謨半樵二忌薑糖徐氏云如有暑邪薑斷不可用雖與芩連並行亦不可也況獨薑湯乎惟初起挾寒者或可量證略用些須糖助濕熱而膩滯滿中誤用之反為穢濁之邪豎幟矣不但增其嘔吐已也推而至於棗子龍眼甘草一切甜膩守滯之藥類可知矣三忌熱湯酒醴澡浴此三者皆驅寒之事也寒傷形則客邪在表飲以熱湯酒醴或暖房澡浴皆可使寒邪從汗而解也故表散寒邪之藥每佐甘草薑棗之類俾助中氣以托邪外出亦杜外邪而不使內入若暑濕熱疫穢惡諸邪皆由口鼻吸入直傷氣分而漸入營分亟宜清涼疏淪俾氣展濁行邪得下走始有生機不但辛溫甘膩一概忌投即熱湯酒醴澡浴皆能助熱焰之披猖不可不嚴申厲禁也四慎痧丸痧藥方最多而所主之證不一有宜於暑熱病者有宜於寒濕病者豈可隨便輕嘗耶更有不經之方群集猛厲之品雜合為劑妄誇無病不治而好仁不好學者廣制遍送間有服之亦效者大抵皆強壯之人風餐露宿為病也概施於人多致輕者重而重者死矣故服藥難施藥不易必也擇方須良擇藥須精刊列證治須分寒熱實心實力行之斯有功而無弊焉如酷暑烈日之中路途卒倒者雖不可以霍亂痧脹名之而其病較霍亂痧脹為尤劇設以泛泛痧藥治之每致不救或口鼻出血而死此為暑邪直入心包絡必以紫雪灌之始效然此藥貴重難得有力者能備以濟世必有善報也凡陰虛內熱之人或新産血去陰陽之後酷熱之時雖不出戶庭亦有患此者余見屢矣詳三篇夢影中五慎延醫醫之用藥猶將之用兵食祿之將尚鮮其良謀食之醫宜乎其陋然十室之邑必有忠信如某者矣語云為人子者不可不知醫要在平時留意知其有活人之術而非道聽途説者流則有病時方可以性命托之知其有用兵之才而非惜死愛錢之輩則有寇時方可以土地人民托之噫難矣六慎服藥選醫難如選將選得矣或徒有虛名而無實學或飽學而非通才或通才而無卓識或見到而無膽略或有膽而少周詳皆不足以平大亂愈大證也故服藥如出師聖人以戰疾並慎也然則如何而可服其藥耶但觀其臨證時審問精詳心思周到辨證剴切方案明通言詞慷爽近情舉止落落大方者雖向未謀面之人亦一見而知為良醫矣其藥可服也七宜涼爽霍亂痧脹流行成疫皆熱氣病氣醞釀使然故房中人勿太多門窗勿閉得氣有所泄也蓋覆勿厚總以病人不覺冷為度昧者不知強加衣被而致煩躁昏瞀者甚多也如樓居者必移榻清涼之所勢劇者宜鋪席於陰涼乾燥泥地上臥之熱氣得土而自消也凡見路途卒倒之人縱無藥贈但能移之陰處即是一服清涼散也吐瀉穢濁隨時掃除淨盡毋使熏觸病人與旁人醫來時尤宜加意否則臭難嚮邇如何息心靜氣以辨證耶八宜鎮靜凡患急證病人無不自危旁人稍露張皇病者逆謂必死以致輕者重而重者遂嚇殺矣蓋人雖壽至百齡未有不貪生畏死者此人之情也故近情之醫雖臨危證非病人耳聾者必不當面言凶親友切勿交頭接耳以增病人之懼婦女更勿顰眉掩淚以致弄假成真九宜泛愛凡患急證生死判乎呼吸苟不速為救治病必轉入轉深救治而少周詳或致得而復失骨肉則痛癢相關毋庸勉強最苦者貧老無依經商旅賈舟行寄廡舉目無親惟望鄰友多情居停尚義解囊出力起此危疴十保胎孕凡懷妊於夏月而陡患腹痛者雖在臨貧之際先須握其手而指尖不冷撫其額而身不發熱者方是將娩之痛否則即是痧患而痧藥類多妨孕概勿輕試余每以晚蠶沙及雪羹治之無不立效挾寒者紫蘇砂仁香附橘紅之類可用設患霍亂重證先取井底泥敷心下及丹田再用卷而未舒之嫩荷葉焙乾五錢蚌粉減半共研新汲水入蜜調服三錢並塗腹上名罩胎散若系寒霍亂用伏龍肝研末水和塗臍方寸干即再塗服藥尤須加慎一切傷胎之品均不可用回陽膏亦不可貼附妊娠藥禁便産須知云蚖青斑蝥水蛭與虻蟲烏頭附子及天雄野葛水銀暨巴豆牛膝薏苡並蜈蚣三稜莪術赭石芫花麝香大戟蛇蛻黃雌雄砒石火芒牙硝大黃牡丹桂槐花子牽牛皂角同半夏制透者不忌南星膽制陳久者不忌兼通草瞿麥乾薑桃仁木通鋼砂乾漆蟹爪甲地膽茅根與蟅蟲本草綱目云烏喙側子羊躑躅藜蘆茜草厚朴及薇銜檔根䕡茹葵花子赤箭繭草刺蝟皮鬼箭紅花蘇方木麥蘖常山蒺藜蟬錫粉硇砂紅娘子硫黃石蠶共蜘蛛螻蛄衣魚兼蜥蜴桑蠹飛生及樗雞牛黃犬兔驢馬肉鰍鱓蝦蟆鱉與龜潛齋叢書云甘遂沒藥破故紙延胡商陸五靈脂薑黃葶藶穿山甲歸尾靈仙樟腦續隨王不留行龜鱉甲麻黃川椒神曲伏龍肝珍珠犀角車前子赤芍丹參益母射干澤瀉澤蘭紫草郁金土瓜根滑石自犀角至此雖非傷胎之藥然系行血通竅之品皆能滑胎非堅實之體不可輕用及紫葳即凌霄花猛厲之藥皆能傷胎人猶知之如薏苡茅根通草厚朴益母之類性味平和又為霍亂方中常用之品最易忽略不可不加意也十一産後丹溪一代宗工乃謂産後宜大補氣血為主雖有別證從末治之景嶽已辨其非矣而俗傳自産後宜溫之説不知創自何人最為悖謬夫産後陰血盡脫孤陽獨立臟腑如焚經脈如沸故仲聖專以養血消瘀為主而石膏竹茹亦不禁用若夏令熱産慮感暑痧無病者萬勿輕嘗藥餌不但生化湯不可沾唇雖沙糖酒亦須禁絶設有腹痛未審是否發痧惟六一散最為雙關妙藥若明系痧證或患霍亂者按常法治之如果熱熾毒深不妨仍用涼化如無虛象勿以産後而妄投補藥如無寒證勿以産後而妄施熱劑魏柳洲云近時專科及庸手遇産後一以燥熱溫補為事殺人如麻故治産後之痧邪霍亂者尤當兢兢也十二善後凡霍亂吐瀉皆止腿筋已舒始為平定若暴感客邪而發者即可向愈口渴以陳米湯飲之知飢以熟蘆蔔熟鳧茈或煮緑豆或筍湯煮北方挂麵啖之必小便清舌苔淨始可吃粥飯鯽魚臺鯗之類油膩酒醴甜食新鮮補滯諸物必解過堅矢始可徐徐而進切勿欲速以致轉病若因伏邪而發者未必速愈證勢雖平尚多枝節否則肢未全和或熱不遽退胸猶痞悶苔色不化溺澀不行此皆餘熱逗留或治未盡善亟宜清滌餘邪宣通氣道勿以其不飢不食而認為吐瀉傷元妄投補滯勿以其神倦肢涼而疑作寒涼過度妄進辛溫良由深伏之邪久匿而不能盡去也仍宜以輕涼清肅之品頻頻煎服俾其疏淪自然水到渠成待得知飢然後以飲食如前法消息之自愈其果因過服寒涼而便溏不已者必溺清不渴可以資生丸調治之方見四篇此段皆名言也因善後不得法誤事者甚多須熟讀初思食時余嘗用鹽調藕粉似亦頗妥陳米湯亦不若緑豆湯為穩謝城乾霍亂痛止為平苔淨口和便堅溺徹為痊飲食消息之法同上寒霍亂輕者得平即愈但節飲食慎口腹可也重者多兼正虛一俟陽回熱藥不可再投但宜平補元氣如液傷口燥者即須涼潤充津蓋病或始於陽虛而大下最能奪液不知轉計必墮前功飲食調理亦憑苔色便溺而消息之可也陽回之後熱劑不可再投知之者甚鮮因過劑而誤事者亦時有之此段語亦甚精當謝城守險霍亂時行須守險以杜侵擾霍亂得愈尤宜守險以防再來昧者不知徒事符籙以為擁兵自衛之謀良可慨已縱恣如常效彼開門揖盜之愚尤可笑也苟欲御亂略陳守險之法如下一人煙稠密之區疫癘時行以地氣既熱穢氣亦盛也必湖池廣而水清井泉多而甘冽可藉以消弭幾分否則必成燎原之勢故為民上及有心有力之人平日即宜留意或疏浚河道毋使積汙或廣鑿井泉毋使飲濁直可登民壽域不僅默消疫癘也此越險守疆之事為御亂首策非吾儕仰屋而談者可以指揮而行也一當此流離播越之時卜居最宜審慎住房不論大小必要開爽通氣掃除潔淨設不得已而居市廛湫隘之區亦可以人工斡旋幾分稍留餘地以為活路毋使略無退步甘於黴時受濕暑令受熱平日受穢此人人可守之險也無如貪夫徇財愚夫忘害嬉玩泄沓漫無警省逮揮霍撩亂突如其來手足無措矣一昔范文正公每就寢則思一日之食與所行之事能相準否雖朝齏暮鹽貧不能自給而每慨然憂天下之憂以其志行磊落足以紀綱人道而豈腆然為飲食之人哉嗚呼此六十四字為故人宜春袁蓮芾布衣跋余飲食譜之絶筆也跋未竟未便刊於譜故列以為霍亂守險之一策因近人腹負者多厚味臘毒臟腑先以不清故穢濁之邪易得而乘之同氣相求勢所必然之事若能效法先賢不徒為飲食之人以其餘資量力而行疏河鑿井施藥救人斂埋暴露掃除穢惡諸事不但保身而杜病吾聞積德可回天不僅可御霍亂也已一祖父家訓不許供設神像遵聖人敬而遠之也余性尤不佞佛生長錢塘天竺山未嘗一到雖食貧居賤而最惡持齋之説先慈聞而責之曰兒自命通脫何亦效迂儒口吻乎夫淡泊自甘者有幾人哉雖以聖賢言行教之其如從而勿改何蓋愚人必動之以禍福惕之以報應而始畏慕勉行也故具不得已之苦心者假神道以設教創持齋之日期誘而掖之斡旋不少試看疫癘流行之際僧尼獨鮮死焉此其明效也余敬聽而識之屢試不爽益嘆母訓之非誣故夏月款客惟用海味乾肉魚蝦之類間或為賓託言茹素亦藉以節主人之費但擇輕清平淡者而食之追憶生平未患痧證敢以此法公諸同世一造酒麴者必取諸草汁以和米糵而成凡草初出之兩葉尖者屬陽性烈而味辛可以造麴初出之兩葉圓者屬陰性涼而味酸或苦皆不中用也故酒性純陽大冷不冰造酒之屋木尚漸腐生物酒浸皆能漸熟不但能腐人腸也然嚴寒之令略飲可御風寒卒犯飛尸溫服可祛陰氣若縱飲無節未有不致病者又惟夏月為尤甚宋劉元城先生云余初到南方有一高僧教余南方地熱而酒性亦熱況嶺南煙瘴之地更加以酒必大發疾故余過嶺即闔家斷飲雖遍厲水土惡劣他人必死之地余闔家十口皆無恙今北歸十年矣無一患瘴者此其效也蘇文忠公云器之酒量無敵今不復飲矣觀此則妄人所謂酒可以闢瘴疫者豈非夢囈夫瘴疫皆是熱濁穢毒之氣所釀同氣相求感受甚易且酒之濕熱久蓄於內一旦因邪氣入之而併為一家其勢必劇其治較難其愈不易縱性耽曲糵甘醉死而不辭者夏令必須戒飲或不屈死於揮霍撩亂之中也一頤生之道易經始發之曰節飲食孔子曰食無求飽應休璉云量腹節所受陸放翁云多壽只緣餐飯少隨園詩話云不飽真為卻病方蓋飢飽勞逸皆能致疾而飽暖尤為釀病之媒故神農氏播谷之餘即收藥味有熊氏垂裳之際聿著方書而世俗罕知因強食致病者不勝縷述緣人身之氣貴乎周流無滯則濁降清升雖感客邪亦潛消默化而不能留著為病惟過飽則胃氣壅塞脾運艱遲偶吸外邪遂無出路因而為痧脹成霍亂者最多故夏令不但膏粱宜屏雖飯食且然況無故喜服參藥妄食膩滯之物如龍眼蓮子以圖補益而窒塞其氣機哉設犯痧穢之邪多致不救今夏有諸暨余小坡進士竄難來申與余親家褚子耘茂才比屋而居亦知醫為人視病歸啖蓮子一盞畢即覺不舒尋即吐瀉轉筋欲請余診而不及以邪氣得補無從宣泄逼其深入故告危如此之速猶之賊來而自棄其險閉城以待斃也嘻可悲已過飽不可過飢亦不可不飽非飢之謂宜知之謝城一鰻鱔性熱助陽鱉性寒滋陰然或有毒者夏令更有蛇變者尤勿輕嘗即無毒者其質味濃厚膩滯難消如吸外邪而誤食之皆難救治市脯尤覺穢濁咸宜杜絶因食鰻鱔而霍亂者余見甚多謝城一瓜果冰涼等物雖能滌熱過食驟食既恐遏伏熱邪不能泄越又慮過度而反為所傷並宜撙節為妙若口不渴汗不出溺不赤者諸冷食皆在所忌也一冬夏衣被過暖皆能致病而夏月為尤甚既因暖而致病矣或又因病而反畏寒以熱鬱於內而氣不宣達也再加蓋覆則輕者重而重者即死矣竟有死已許久而旁人未知者年來聞見甚多比如開門揖寇城已陷或有尚在夢中而不覺者可嘆也已亦勿過於貪涼迎風沐浴夜深露坐雨至開窗皆自棄其險而招霍亂之來也不可不戒一食井中每交夏令宜入白礬雄精之整塊者解水毒而闢蛇虺也水缸內宜浸石菖蒲根降香一天時潮蒸室中宜焚大黃茵陳之類亦可以解穢氣或以艾搓為繩點之亦佳一用川椒研末時塗鼻孔則穢氣不吸入矣如覺稍吸穢惡即服玉樞丹數分且宜稍忍飢俾其即時解散切勿遽食尤忌補物恐其助桀為虐譬姦細來而得內應也一無論老少強弱之人虛實寒熱之體常以枇杷葉湯代茗可杜一切外感時邪此葉天士先生法也見醫案存真然必慎起居節飲食勿謂有葉先生法在諸可廢弛也一無論貧富夏月宜供饌者冬醃乾菜盧蔔芹筍鳧茈絲瓜冬瓜栝蔞豇豆紫菜海帶海蛇大頭菜白菜甜菜及緑豆黃豆所造諸物人人可食且無流弊肉食者鄙焉知此味嗚呼苟能常咬菜根則百事可做豈但性靈不為汩沒足以御揮霍撩亂之災乎揮霍撩亂突如其來集餉徵師動需時日莫若乘其初發何難一擊而平爰備載伐毛取嚏刮淬刺急拓救諸事宜於前復詳偵探策應紀律守險諸機要於後雖婦豎一覽咸知剿御之方既可各保身家而厲氣莫能張其焰或可不蹈兵馬過籬笆破之諺也故列治法第二
