body:
  text: 卷下醫案篇第三南針張戴人曰泰和間余見廣濟院僧病霍亂一方士用附子乾薑同煎放冷服之服訖嘔血而死如此而死必是暑證洄溪云暑證忌姜雖與連芩同用亦有大害況與附子同行禍更烈矣頃合流鎮李彥直中夜忽作吐瀉自取理中丸服之洄溪云此是寒霍亂之方百不得一誤用者禍不旋踵醫至謂有食積以巴豆藥三五丸下之亦不動至明而死縱有食積何必下以巴豆遂平李仲安攜一僕一佃客至偃城夜宿邵輔之家是夜僕逃仲安覺其逸也騎馬與佃客往臨穎追之時七月天大熱炎風如箭埃塵漫天至辰時而還曾不及三時往返百二十里既不獲其人復宿於邵氏齊忽夜間聞呻吟之聲但言救我不知其誰也執火尋乃仲安之佃客也上吐下瀉目上視而不下胸脅痛不可動搖口缺而脫臼四肢厥冷此正風濕暍三者俱合之證也夜行風大兼感涼氣乘馬疾馳更挾勞瘁其壻曾聞余言乃取六一散以新汲水銼生薑調之頓服半升其人復吐乃再調半升令徐服之良久方息吐證服藥往往不受必徐徐服始合法也至明又飲數服遂能起生薑不煎但銼入新汲水中而調六一散取其微辛佐甘涼之劑以解風暑而清濕熱略無助火之弊可為用藥之法調養三日平復先清外感而後調其勞悴之傷可為治病之法羅謙甫治一蒙人因食酒肉潼乳而患霍亂從朝至午精神昏憒脈皆浮數暑邪未去按之無力所傷之物已出矣正氣已虛即以新汲水調桂苓白朮散徐徐服之妙隨作地漿水澄取清者一杯再調服之尤妙吐瀉遂止次日微煩渴與錢氏白朮散時服而愈脈證如是而所傷之物已出則知中氣傷殘暑邪未解故用補正清邪之治凡虛人受暑而病此者即以是案為法可也其理中四逆等方皆治陰寒致病非治暑也此等界限不清亦何足以言醫耶又治提舉公年近八十六月間患霍亂吐利昏冒終日不省人事暑邪內擾脈洪大有力一息七八至火勢沖激頭熱如火邪熱上僭不是戴陽足冷如冰肺氣不降非下虛也半身不遂胃氣大亂不能束骨利機關牙關緊急熱入陽明之絡不是中風遂以甘露散瀉熱補氣安神明加茯苓以分陰陽冰水調灌漸漸省事而諸證悉去後慎言語虛證最要節飲食諸病宜爾無病人亦宜爾三日以參朮調中藥理正氣十日後方平復汪石山治一人年三十餘形瘦弱忽病上吐下瀉水漿不入口七日自分死矣未服燥熱藥猶可不死診脈八至而數曰當夏而得是脈暑邪深入也提舉以八十之年而脈八至此人七日不進水漿脈亦八至若非明眼必以為虛矣吐瀉不納水穀邪氣自盛也遂以人參白虎湯進半杯良久復進一杯徐進可法覺稍安三服後減去石膏知母而人參漸次加至四五錢操縱有法黃柏橘皮麥冬等隨所兼病而佐使製劑有法一月後平復暑盛元傷之治此案可法一僕伕燕京人縱酒飲食無節病霍亂吐瀉轉筋煩渴幾殆時六七月淋雨晝夜飲檐溜水數升而安貧而無人服侍得飲此而愈余亦曾見一人如是後生六子起家致富孫曾繞膝壽至九秩而終若富貴人患此則每為溫補藥所誤也千金方云輕者水瘥良然良然古人豈欺我哉此偶合古方余目擊其事後路途中及六合縣見一人服新汲井水良愈凡暑熱病渴喜冷飲者但以新汲水或冬雪水徐徐飲之皆能向愈不但霍亂為然也今人雖明知其患熱而尤禁飲冷何耶一人病霍亂欲吐不吐欲瀉不瀉心腹㽲痛脈之沉伏如無痛脈每如是此乾霍亂也急令鹽湯探吐宿食痰涎碗許遂瀉上竅得開下竅自通但得吐瀉即可治矣與六和湯愈孫文垣治程氏子先醉酒後入房其平素縱恣貪涼可知矣次早四肢冷胃脘痛極脈僅四至或以鬱火治投以寒涼痛更甚三日前所食西瓜吐出未化傷冷已甚乃翁以為陰證傷寒今人凡聞病犯房事者雖不傷冷食亦謂之陰證傷寒輒以丁附薑桂殺之可慘也已欲用附子理中湯不決此翁頗虛心故乃郎有命逆孫視之面色青慘叫痛而聲不揚坐臥煩亂是霍亂兼蛔厥證也先當止痛安蛔後理霍亂可免死也遲則誤事矣急用醋炒五靈脂三錢蒼朮一錢五分烏梅三個川椒炮薑桂心各五分水煎飲下痛減大半恣啖生冷復傷於酒更誤於寒涼之藥故以溫胃安蛔得效下午以大腹皮藿香半夏橘皮山楂茯苓五靈脂兩帖全安仍以和中化滯理其脾胃而愈入房一端略不置議洵可法也江篁南治從叔於七月間得霍亂證吐瀉轉筋足冷多汗囊縮一醫以傷寒治之增劇庸工常技江診之左右寸皆伏不應上下痞塞故脈伏而微尺部極微口渴欲飲冷水足冷囊縮似屬厥陰口渴亦似少陰引水自救何以辨之曰直中陰經無轉筋多汗證若少陰頭有汗則死矣乃以五苓散與之此治傷寒霍亂有表證之方江氏不察泥於熱多欲飲水句而誤也此時如用桂苓甘露飲則得矣覺稍定向午猶渴囊縮乃暑熱入於厥陰故口渴欲飲冷非傷寒也而與傷寒藥渴何能已以五苓加麥冬五味滑石投之始知為暑熱矣僅加麥冬滑石不足蔽辜而五味酸溫尤不宜用更以黃連香薷飲冷進一服前方拘泥俗說妄用五味不知服後何如忽進此劑殊屬可笑次早脈稍出按之無根且人脫形連投溫燥又以香薷升散宜乎如是厄忒手足逆冷飲食入口即吐桂術五味香薷等藥見效矣大便稍不禁為灸丹田八九壯囊縮稍舒手足稍溫伏熱得火灸已有流行之勢繼以理中湯二三服茫無頭緒若江氏者可謂蔽於古而不知今者也氣液兩傷豈可再服此湯渴猶甚咽痛熱不解時或昏沉理中湯又見效矣可見囊縮不是虛寒也乃以竹葉石膏湯焦頭爛額之客投之而愈此案江氏初治原知為熱止用泥古遂致一誤再誤逮噦吐形脫之時又不知清補兼施而艾灸理中幾至潰敗幸而不用附子故未著尚能挽救然亦危矣讀者鑑諸江少微治一婦人六月中旬病霍亂吐瀉轉筋一醫投藿香正氣散此治襲涼飲冷兼寒濕而成霍亂之方加煩躁面赤揭衣臥地藿香正氣散溫散之劑也尚不可誤施於暑熱霍亂故誤投附桂者每見下咽即昏沉厥冷渾身青紫而死醫者猶謂陰盛已極此等大熱之藥尚不克救再遇此證仍以此法投之至老不悟而死者之冤亦無從訴此余之所以述霍亂轉筋諸治法為世告也江診之脈虛無力身熱引飲此得之傷暑宜辛甘大寒之劑瀉其火熱以五苓散加滑石石膏吐瀉定再與桂苓甘露飲而痊暑熱為病脈多虛微澀弱弦細芤遲以熱傷氣也甚至隱伏不應指或兩尺絶無皆邪滯經絡上下格拒使然不可誤認為虛寒也亦有脈因火煽而反洪大滑數異常者此霍亂所以無一定之診臨病極宜善審也陳三農治一婦暑月方飯後即飲水而睡睡中心腹痛極肢冷上過肘膝欲吐利而不得吐利㽲痛垂死六脈俱伏令以藿香正氣散煎湯探吐一吐減半再吐而安此停食飲冷睡臥當風而成乾霍亂也以對證之劑引吐又合機宜不必拘守鹽湯一法也繆仲淳治高存之家僕婦患霍亂以砂仁一兩炒研鹽一撮沸湯調冷服一劑愈此治夏月貪涼脾胃不和之輕證也冬月感寒患此亦可用但宜溫服余嘗自驗傷冷物者加吳茱萸張石頑云一少年新婚陡然腹痛麻瞀醫通謂之番痧即乾霍亂之因熱者或令飲火酒半杯此必疑其陰證也而不知少年新婚最多火證何也以不論貧富冬夏衣被皆新而合歡成禮勞則生火也腹痛轉劇旋增顱脹身發紅點熱毒得酒愈識若不急從清解必七竅流血而死與蘆根汁解酒毒而清熱得吐痛解復有鼻衄口燥胸腹略見紅斑血分熱極啜童子小便稍安清營妙品又濃煎蔥豉湯宣解惡氣穢毒之聖藥仍入童便續續與之得大吐汗出而痊葉天士治一人霍亂後中氣大虛肝風內動心中空洞身痛肢浮用異功散加木瓜薑棗按此以培中制木之劑而為霍亂善後之治最可法也若見身痛肢浮而誤用表散之品則內風愈動脾土重傷因而致殆者多矣夫霍亂固是中焦土病而土病多由木侮故雖治寒霍亂必首察厥陰之動靜倘其人肝陰素虧內風暗動者姜附等極宜慎用即當用者亦須妥為駕馭毋使過劑設或無節雖不似熱霍亂之立時殞命亦必增劇而生枝節試觀仲聖治厥陰下利之用白頭翁湯其義自明蓋厥陰雖當兩陰交盡而具合晦朔之理陰之初盡即陽之初生其本陰其標熱其體木其用火是以獨稱剛臟而爵以將軍顧名思義可以悟其治矣世有治肝氣惟崇剛燥者驟則變痙厥緩則成關格人但知病之日深而不知藥之所釀並及之以為醫家病家兩鑑焉懷抱奇治一男子恣飲梅水吐瀉無度手足厥逆面色慘晦聲音不出而脈沉伏小水點滴不通服藥入口即吐醫告技窮余思梅味酸主收故小便癃閉而果得麝則敗麝又香竄走竅乃取麝半入臍中半入鼻孔病者即以手拂其鼻曰此何物也少頃小水大下二三行忽如醉而醒夢而覺越日索粥漸安此無外因者故但以敗果通竅即能奏效其巧思正不可及也童栻廬治陳氏婦盛夏病霍亂吐瀉腹中㽲痛四肢厥冷冷汗溱溱轉筋戴眼煩躁大渴喜冷飲飲已即吐六脈皆伏雖曰霍亂實臟厥也經云大氣入臟腹痛下注可以致死不可以致生速宜救陽為急遲則腎陽絶矣以四逆湯薑附各三錢炙甘草吳茱萸各一錢木瓜四錢煎成冷服日夜連進三劑四肢始和危象皆退口渴反喜沸湯寒象始露即於方中佐以生津存液之品兩服而安按此案論證用藥皆具卓識其真諦全在喜冷飲而飲已即吐及服熱藥後反喜沸湯也設能受冷飲者即為內真熱而外假寒然熱證亦有胸下格拒不通雖喜冷飲飲已仍吐必細細呷之始能受也亦有痰濕內盛雖渴而喜熱飲者皆不可誤認為寒也故必辨舌苔之色澤驗小水之有無始無遁情案中未及尚缺周詳且大氣入臟非人人共患之疫而疫氣流行之際亦間有此一證故醫者必議病而用藥毋執方以殺人是乃仁術倪姓患霍亂吐瀉審知始不作渴四肢不逆脈不沉細易治之證一醫用大順散兩帖漸至於此因見四逆復加附子脈證更劇我見實多童曰此病一誤再誤命將殆矣若果屬寒投熱病已今反四逆脈轉沉細欲伏乃釀成熱深厥深與熱邪傳入厥陰者何異辨證中肯即以竹葉石膏湯人參易西洋參是加黃連滑石兩劑而安同時有陸姓患此醫用回陽之劑日夜兼進豈真欲其速死哉紙上談兵讀書無眼者往往如是不僅粗工爾也我見亦多厥逆煩躁日增病人欲得冷水禁絶不與可恨可嘆甚至病者自起拾地上痰涎以解渴可慘可憐遷延旬日而死能延旬日則欲得冷水時若能轉計猶可活也噫即使真屬陰寒陽回躁渴如是熱藥之性鬱而無主以涼藥和之病亦立起不學無術曷勝浩嘆涼藥和之妙理未經人道謝城張氏女夏月患霍亂醫用薑附藿朴茱連等藥嘔吐雖止腹痛不已而痢五色至第八日童診脈細數沉部有力兩目罩翳舌絳唇紅胸膈煩悶口渴引飲是暑穢之毒擾亂中宮而病霍亂苦熱雖能開鬱止嘔畢竟反助邪勢致變五色毒痢此暑毒尚不甚重而兼濕邪故僅變五色毒痢若無濕而暑毒重者早不救矣與子和桂苓甘露飲加黃連銀花黑豆兩服翳退而諸恙遞減胃亦稍蘇因畏藥不肯再服余謂餘邪未淨留而不去戕害臟腑必轉他病乃與三豆湯加甘草頻飲而愈湯芷卿曰常州伍某素壯健方啖飯忽呼痛倒地云胸膈如刀割群醫莫治閲三日懨懨待斃矣一老人過問病情令磨陳墨汁與啜痛立止病如失因問是何證也曰記少時鄰人患病類此一老醫以此法治愈云誤食天絲毒也想墨汁無害故令試之不料其果合耳此證雖罕設有之人必以為乾霍亂耳故採之以廣聞見固始有人於元旦食湯圓訖方出門賀歲忽腹如火燒痛不可忍絶暈仆地移時稍蘇而號痛聲徹四鄰諸醫皆云脈細如絲不治痛極脈多細伏越日門外來一丐僧家人辭以有病僧云何不問我家人苦無策姑令入僧一望即曰是誤食蛇精也神乎伎矣世有飽讀醫書而不識一證自命為儒醫者人因信其學問而並信其醫彼此貿貿雖日殺人而不悔悟宜乎畸人逸士之晦跡以遁也可慨也夫於破囊中取藥一丸以水研灌移時病者起嘔如雀卵者數枚僧曰未也復嘔穢狼藉出一物如雞子大僧曰是矣剖視乃血裹中蟠一小蛇見人遽動作勢上下病已若失舉家驚服我亦拜服叩其所以曰多年陳谷蛇交其上餘瀝黏著誤入腹中乃成此物少停即洞胸腹出矣僧徑裹蛇而去案揮霍撩亂已不易平必辨陰陽始能奏績此證雖非霍亂而病去迅疾儼似食滯之乾霍亂且證勢之撩亂較霍亂為尤亂也苟無破敵之才徒有虛名之學焉能平此大亂哉用藥如用兵丐僧有之矣採此以為撥亂反正者告勿以資格用人也凡腹中卒然大痛在飲食後而無別證可憑者多系誤食毒物重用紫金丹或玉樞丹研灌似亦有效楊素園治其仲郎壬子夏患乾霍亂身熱不渴口燥無苔六脈俱伏痛在胃脘連及胸脅勢甚洶湧先與地漿一碗勢少定少頃復作因徑投大承氣湯一帖其痛即下行至臍間又一帖痛又下行伏於少腹右角按之則痛不按則與平人無異起病至此已歷周時思食甚急乃以緑豆煮粥與之食後一切如常惟少腹右角按之仍有小塊隱隱作痛遂重用當歸枸杞蔞仁佐以桃仁紅花少加牛膝以導之服一時許腹中汩汩有聲下紫黑血一塊若五寸許而少腹之痛塊若失此病治法原出一時臆見然竟以獲痊特録出質之半癡不知以為何如按霍亂證因於暑熱者多故感受稍重極易入營古人刺以泄血及內服益母湯藕汁童溺皆所以治營分之邪也楊公子舌燥無苔而不渴痛又及脅必平日偶有絡傷未覺乃邪遂乘瑕而入也承氣之硝黃並是血藥氣行則瘀降故痛得漸下逮塊在而按之始痛且知飢能食益見氣分之病已蠲而血分之邪尚匿毋庸承氣之直攻改從濡化而曲導操縱有法余服其手眼之超景嶽謂飲食下行之道必由少腹下右角而後出於廣腸自誇閲歷而知古人並未言及蓋渠嘗治一人食麵角雜投巴豆大黃而不效也魏柳洲曰就此觀之景嶽平生臨證遺憾多矣夫面角由胃入腸既至少腹之角豈能作痛如是而又如拳如卵必其人素有疝病偶因食麵而發或兼當日之房勞遂乃決張如是故推蕩之藥不應得木香火酒一派辛熱香竄而痛始止也至謂食由少腹下右角而後出廣腸更堪捧腹經謂大小腸皆盤屈十六曲則左旋右折可知豈如筒如袋而直下乎嘻案楊公子少腹右角之痛設非乃翁卓識時醫必誤認食滯特附録魏語以廣其義為崇尚景嶽者告山陰田雪帆明經晉元著時行霍亂指迷辨正世俗所稱吊腳痧一證以為此真寒直中厥陰肝經即霍亂轉筋是也初起先腹痛或不痛瀉利清水頃刻數十次少者十餘次未幾即手足抽掣嘔逆口遏厥逆聲嘶脈微欲絶舌短目眶陷眼上視手足青紫色或遍身青筋硬凸如索汗出脈絶急者旦發夕死緩者二三日或五六日而死世醫或認為暑濕妄投涼瀉或認為痧氣妄投痧藥鮮有不斃宜用當歸四逆加吳茱萸生薑湯水煎冷服輕者二三劑即愈重者多服幾劑立可回生真神方也如嘔者加製半夏三錢淡乾薑一錢口渴恣飲舌黃加薑汁炒川連五分為反佐經所謂熱因寒用也腹中絞痛名轉筋入腹加酒炒木瓜三錢手足冷過肘膝色見青紫加製附子三錢此證種種皆肝經見證耳緣坎中真陽為邪寒所逼因之外越所謂內真寒而外假熱也但以脈辨之自無遊移矣寒犯厥陰而為霍亂轉筋者容或有之豈可以概論時行之證耶果系寒犯厥陰而吐利汗出則當用吳茱萸湯加減或烏梅丸法不當用當歸四逆加吳茱萸生薑湯以當歸四逆本桂枝湯加當歸通草細辛通血脈以疏肌表非汗出脈絶之證所可輕嘗至脈不可憑必以口渴舌黃喜冷飲為辨真熱假寒之確據竟敢顛倒其說曲為妄解何欺人之太甚哉書生紙上談兵好發想當然之議論惑世誣民大率類是不可不辨也故附録於此夢影道光元年冬金履思丈念祖父之勞勩命余佐理鹺務於婺州之孝順街公餘之暇輒披覽醫書焚膏繼晷樂此不疲三年夏間主政周光遠先生年二十七體極腴皙登廁後忽體冷自汗唇白音低僉以為痧欲進開竅等藥時餘年十七竊握其臂以診之脈已微軟欲絶因力排衆議曰此陽氣之欲脫非痧邪之內閉再投香散殆速其危也人皆以童子何知而笑之幸先生聞而首肯者再倉卒不及購藥余適有戚氏前所貽三年女佩姜一塊約重四五錢急煎而灌之即安後用培補率以參耆朮草為主蓋陽氣偏虛之體也先生甚德之視余若弟且逢人說項遂以浪得虛名癸卯為余刊治案余愧無以報也先生年五十歲無疾而逝猶是陽虛暴脫耳無子一女適蔡氏其夫人年逾六旬杭垣再陷後未知下落無從探訪追録是案抱憾滋深又癸卯冬至前一日管椒軒大中丞忽於溺後汗淋氣短色奪言微余適往靈隱送葬三遣辨丁速余至署已痧藥進之屢矣莫可挽回凡陽氣極虛之人便溺後忽然欲脫是急宜參附回陽之證誤認為痧多致決裂治霍亂者須明辨之孝順一倉夫丙戌春忽患急證扒床拉席口不能言問其所苦惟指心抓舌而已人皆以為乾霍亂余謂乾霍亂何至遽不能言且欲抓舌似中毒耳或云同膳數人何彼中毒然刮之淬之皆不驗余以夤夜無從購藥令取緑豆二升急火煎清湯澄冷灌之果愈越日詢之始言久患痹痛因餌草頭藥一服下咽後即心悶不可耐舌麻不能言而旁人不知也一伎自幼喜食蠶蛹游上江者數年久不食此比旋杭得與家人暢啖正歡笑間腹痛陡作隨地亂滾或以為絞腸痧亟請余勘之脈色皆和非痧非食也若以為中毒則共食老少皆無恙諦思之雖以椒蒜炙熟與人同啖恐其中有一二枚或異者亦未可知蠶動物也與馬同氣其性熱更益以椒蒜之辛姑仿中馬肉毒例治之命吸人乳果飲下即安己丑五月天氣驟熱先慈陡患霍亂肢冷自汗脈微苔白腹大痛欲重按是中虛有素因熱而受寒侵也進大劑理中湯加桂枝白芍覆杯而愈此所謂舍時從證也丁酉八九月間杭州盛行霍亂轉筋之證有沈氏婦者夜深患此繼即音啞厥逆比曉其夫皇皇求治余診其脈弦細以澀兩尺如無口極渴而沾飲即吐不已足腓堅硬如石轉時痛楚欲絶乃暑濕內伏阻塞氣機宣降無權亂而上逆也為仿金匱雞矢白散例而處蠶矢湯一方令以陰陽水煎成候涼徐服此藥入口竟不吐外以燒酒令人用力摩擦其轉戾堅硬之處擦及時許鬱熱散而筋結始軟再以鹽滷浸之遂不轉戾吐瀉漸止晡時復與前藥半劑夜得安寐次日但覺困極耳與致和湯數服而痊後治相類者多人悉以是法出入獲效惟誤服附子者最難救療此證火酒摩之時許鬱熱散而筋漸舒則轉筋雖因火熾必兼外寒鬱遏而始反戾也大抵霍亂寒熱相搏者多雖知其為寒為熱亦須反佐以治蓋即此理謝城鄭鳳梧年六十餘秋間患霍亂凜寒厥逆煩悶躁擾口不甚渴或以為寒余察脈細欲伏苔白而厚乃暑濕內蘊未化也須具燃犀之照庶不為病所蒙因制燃照湯與之一飲而厥逆凜寒皆退脈起而吐瀉漸止隨以清滌法而愈一婦年少體瘦初秋患霍亂轉筋舌絳目赤大渴飲冷脈左弦強而右滑大此肝胃之火素盛而熱復侵營也以白虎湯去米草加生地蒲公英益母草黃柏木瓜絲瓜絡薏苡一劑知二劑已丹溪云轉筋由於血熱此證是矣一丁姓者患霍亂苔色白薄而不渴但覺口中黏膩彼自知醫欲從寒濕治余曰中焦原有寒濕所以不渴然而黏膩豈非暑入而釀其濕為熱乎以胃苓湯去甘術加苡仁川連半夏枇杷葉二劑而瘳錢某患霍亂自汗肢冷脈無平日貪涼飲冷人皆謂寒證欲用大劑熱藥余曰苔雖白然厚而邊絳且渴甚頭大痛不可因寒涼致病而竟不察其有暑熱之伏也遂以五苓去朮加黃連厚朴黃芩竹茹木瓜扁豆服後脈稍出汗漸收吐利亦緩即去肉桂加桂枝滑石甘草頭痛吐利皆止苔色轉黃隨用清暑和中而愈一少年體肥畏熱因酷暑晨餐酒肉後以席鋪磚地而臥覺即飽啖西瓜至晚覺頭重惡寒夜分吐瀉大作四肢拘急汗冷息微時時發躁黎明速余勘之脈沉弱豫漿水散加吳茱萸厚朴投匕即瘥改授厚朴生薑半夏甘草人參湯數服而愈陸叟年七十餘仲秋患霍亂自服單方二三日嘔吐雖已利猶不止且頻頻作噦聲不甚揚面赤目閉小便不通醫云高年戴陽證原不治且延已數日縱投大劑回陽亦恐不及余視之脈雖虛軟並無脫象況舌赤而干利下臭惡氣分伏暑業擾及營慮其絡閉神昏胡可再投熱劑聞所煎之藥桂氣撲鼻試之必死迫令將藥傾潑遂以紫雪三分用竹茹枇杷葉通草丹參連翹石菖蒲桔梗黃芩蘆根煎湯候涼調而徐服次日復診目開噦止小溲稍行於前方裁紫雪加石斛苡仁服二劑利減能啜米飲矣隨用致和湯十餘服而瘳戊戌夏倪懷周室新産數日患嘔吐泄瀉時時自汗人皆危之余曰此非真霍亂也然較真霍亂尤險以其犯産後三禁而脈微欲絶亟宜峻補遲恐無濟也豫東洋參龍牡耆朮木瓜扁豆茯神石英酒炒白芍橘皮為劑四服而痊新産後用參耆大補而又當盛夏之時非有真知灼見者不能也誠以天下之病千變萬化原無一定之治奈耳食之徒惟知執死方以治活病豈非造孽無窮亦何苦人人皆欲為醫而自取罪戾耶錢塘周熔光遠此證正惟産後放膽參耆猶人所能及須看其餘藥一一合拍蓋得效不僅在參耆也至此方可云峻補然慣服補劑者必嫌其輕加鹿角五味等必貽害矣古來多少佳方為妄人加減貽害者何限王某久患吐血體極孱易沈琴癡拉余治之甫得漸愈乃庚子夏酷熱之時陡患霍亂轉筋大汗如雨一息如絲人皆謂無生理矣余不忍輕棄勉用西洋參枇杷葉龍牡蠶沙木瓜扁豆苡仁滑石桑葉石斛豆卷地漿煎服之良愈調理旬日仍服滋補以治宿恙倡女藹金年二十七患時疫頗危余為治痊矣忽又求診云患急痧及察其脈甚細而按之數緊神極委頓氣喘欲嘔腮紅腹痛舌潤似房勞太過寒襲奇經之男勞復也詢得其情遂以胡桃肉破故紙龍牡鹿角霜菟絲覆盆枸杞茯苓小茴當歸韭子為方一劑知二劑已若貿貿然竟作乾霍亂治當何如耶乾霍亂而誤投此法又當何如耶臨證如神敘證如繪佛心仙手其言藹然而一片靈光傳之紙上效顰不易洵是天才仁和胡耀曾榮甫戚媼者年六十餘矣自幼傭食於杭州黃蓮泉家忠勤敏干老而彌甚主僕之誼勝於親戚也壬寅秋患霍亂轉筋余視之暑也投蠶矢湯兩服而瘥三日後忽倦臥不能反側氣少不能語言不食不飲蓮泉惶懼就近邀一老醫診之以為霍亂皆屬於寒且昏沉欲脫定附子理中湯一方蓮泉知藥猛烈不敢遽投商之王君安伯安伯云且勿服也若謂寒證則前日之藥下咽即斃吐瀉安能漸止乎蓮泉大悟仍著人飛刺招余往勘余曰此高年之體元氣隨吐瀉而虛治宜用補第余暑未清熱藥在所禁耳若在孟浪之家必以前之涼藥為未當今日溫補為極是縱下咽不及救亦惟歸罪於前手寒涼之誤也設初起即誤死於溫補而舉世亦但知霍亂轉筋是危險之病從無一人知此證有陰陽之異治法有寒熱之殊而一正其得失者況一老年僕媼非賢主人亦焉肯如是之悉心訪治乎此病之所以不可為也今蓮泉見姜附而生疑安伯察病機之已轉主人愷惻而心虛客亦多才而有識二美相濟遂使病者跳出鬼門關醫者卸脫無妄罪幸矣幸矣乃以高麗參麥冬知母葳蕤木瓜扁豆石斛白芍苡仁甘草茯苓等服六劑始能言動漸進飲食調理月餘而健簠齊謂余云此餘熱未清正氣大虛者之治法更有不因虛而余焰復燃者須用煉雄丹治之是證以半癡之學問蓮泉之厚德安伯之見識三美相濟始能起九死於一生世之執死方治活病視僕婢如草芥不分皂白信口雌黃者讀此能無愧死耶光遠周光遠先生歸杭定省七月十八夜患霍亂轉筋甚劇倉卒間誤服青麟丸錢許勢益甚侵曉召余診脈微弱如無耳聾目陷汗出肢冷音啞肉脫危象畢呈藥恐遲滯請其太夫人先濃煎參湯亟為接續隨以參朮苓芍附桂乾薑扁豆木瓜苡仁蓮實為方終劑即各證皆減蓋氣分偏虛之體不禁吐瀉之泄奪誤餌苦寒微陽欲絶故以真武理中合法以復脾腎之陽詰朝再視脈起肢和即裁附桂乾薑加黃耆石斛服旬日全愈凡吐瀉甚而津液傷筋失其養則為之轉故治轉筋者最要顧其津液若陽既回而再投剛烈則津液不能復而內風動矣此寒霍亂之用附桂亦貴有權衡而不可漫無節制致墮前功也余此番之病危同朝露若非半癡恐不能救嘗聞張柳吟先生云使病者聽半癡論病之無微不入用藥之無處不到源源本本信筆成章已覺疾瘳過半古云檄愈頭風良有以也光遠案中議論極精微凡用藥皆宜具此權衡方無過當之言否則藥雖中病而服之不止反受其害不但熱藥爾也定州楊照藜素園霍亂之霍即霍疾之義謂亂之最速者也嘗見體素豐腴之人一病半日僅存皮骨其傷人之速可知蓋霍亂脾土先傷脾主肌肉也謝城陳藝圃亦知醫其室人於仲秋患霍亂轉筋自診以為寒也投熱劑勢益甚招朱椒亭視之亦同乎主人之見也病尤劇乃延余勘曰此寒為外束之新邪熱是內伏之真病口苦而渴姜附不可投矣與河間法人皆不信再與他醫商之仍用熱劑卒至口鼻出血而死霍亂一證近來時有而醫皆不甚識得清楚死於誤治極多半癡特著專論辨析簡當實今日醫家首要之書以其切於時用不可不亟為熟讀而研究也光遠甲辰五月下旬天即酷熱異常道路卒死者甚多有腹痛者有不痛者人率以香燥痧丸投之輒無效蓋香燥反以益熱而此證並非陰寒濕毒之邪即古所謂中暍也不出戶庭之人亦有病此者必其人陰分素虧內熱較甚或居處飲食之失宜也往往延醫不及醫多不識其病雖死身不遽冷亦有口鼻流血者是暑從吸入直犯心臟也時余居錢塘之髦兒橋嘗稟先慈令家人慎起居薄滋味乃六月初二日午膳後季傑弟婦腹忽微痛平日貪涼自謂受寒也私囑女僕沽燒酒飲之即狂瞀不安先慈知之命僕從四路速余回日晡昳也病者已口鼻出血死矣其時新産婦人死者尤多以陰血大去暑熱易侵而昧者不知因時制宜尚扃其窗戶幕以簾幃環侍多人飲以糖酒故也粗工亦不察天時人稟之不齊動輒生化湯雖熱象已顯猶誤信産後宜溫之俗說而不知因證制方之活法以致覆杯而斃者比比或問當此熱地如爐惡露不行而腹痛者生化湯既不可服宜用何方余謂六一散最佳既行瘀血又能清熱也設暑熱重感雖石膏犀角對證皆為良藥古人何嘗禁用余案中治愈諸條皆可參閲然難與淺人言也盔頭巷姚氏婦妊已臨月腹中陡痛家人謂其欲娩急煎參湯以助其力服後痛益甚忙喚穩婆至婦已渾身赤斑喘逆昏狂始知受暑頃刻云亡寶佑坊曹氏婦亦懷妊臨月腹痛家人以為將産而煎參湯逮湯成痛已止察其情景知不即娩然炎威甚烈參湯久存欲壞其姑云婦既未娩豈可服參以滯胎氣我體素弱常服補劑參湯定亦相宜遂飲之甫下咽即覺氣悶躁擾霎時危殆逾刻而終後丙午壬子丙辰皆酷熱傷人不勝縷述古人以燥熱為暑故曰流金爍石況人非金石之質乎惜世人多不察耳不但酷暑時胎前産後之腹痛當細審其有無別故也潘紅茶方伯之孫翼廷館於外氏酷熱異常因啜冷石花一碗遂腹痛痞悶四肢漸冷上過肘膝脈伏自汗神困懶言方某診謂陽虛陰暑脫陷在即用大劑薑附丁桂以回陽病者聞之益形餒憊其叔嶽許杏書茂才駭難主藥適族人許芷卿茂才過彼遂與商之芷卿雲此藥豈容輕試而病象甚危必延半癡決之時已乙夜余往視面色垢滯苔膩唇紅是既受暑熱驟為冷飲冰伏大氣不能轉旋故肢冷脈伏二便不行所謂閉證也何脫之云亟取六一散一兩以淡鹽湯攪之澄去滓調下紫雪一錢翼日再診脈見痛蠲溺行肢熱口乾舌絳暑象畢呈化而為瘧與多劑白虎法而痊丙午舉於鄉杏書多才尚義與余稱莫逆庚申春聞其罵賊而死嗚呼榮矣認證既確治法用辛香以通冰伏之氣用意又極精妙真可為萬世法程素園室人徐氏素無病胃亦強且善作勞丙午八月朔夜猶鐙下針黹伴余勘書夜分忽瀉二次晨起為余疏發未畢又瀉一次因診之脈七至而細促不耐按略無病苦此脈病人不病殆不始於今日不可救藥也未便明言即令安歇密稟先慈函致乃兄友珊請醫商治既而瀉頗緩且食山東掛麵一小碗先慈謂余太矜持矣余方躊躇面即吐出灌以參藥亦不受瀉較緊午刻醫來亦云無法然尚能以乳哺女而既吸之後乳即癟而不起矣形亦漸削汗亦漸多脈亦漸脫音亦漸嘶戌刻遽逝斯人也性極賢淑且隔屏一聽即知客之賢否一旦抱此絶證知者無不悼惜乃中氣卒然潰散絶無僅有之候也戊申秋仲張春橋令弟陡患腹痛適飽啖羊肉麵條之後初作痧治繼作食治痛愈甚而大渴然啜飲輒吐二便不行又作寒結治其痛益加呻吟欲絶已交四日余診脈弦數苔干微黃按腹不堅非痧非食特肝火鬱而不宣耳以海䖳一片鳧茈八兩煎至䖳煬頻灌果不吐將余汁煎梔連茹楝知芩延胡旋覆柿蒂枇杷葉為劑吞當歸龍薈丸投已即溲行痛減次日更衣不勞余藥而瘳朱留耕忽於飽食後大吐而厥冷汗息微厥甫回而腹痛異常乃翁湘槎以為急痧霍亂之候也速余往勘脈至弦緩口極苦渴二便不行乃痰滯而熱伏厥陰肝氣無從疏泄也豫雪羹萸連梔楝旋茹橘核元胡蓯蓉為劑加蘆蔔汁和服一劑痛減再服便行而愈痧證霍亂挾食者必先去食傷寒亦然秦氏論之詳矣然竟有病始飽食之餘初非因食為患者半癡嘗云既無枵腹待病之理豈可專以攻消為治故臨證必審問慎思而明辨之庶免顢頇貽誤之弊上二案病皆起於食後朱證已得大吐不從食治人或能之張證不吐不瀉腹痛日甚雖明眼臨之不免眩惑乃半癡獨以非痧非食斷竟投匕果瘥已非人所能及矣余門人沈南臺癸丑冬患病亦啖羊肉麵條而起勢瀕於危得半癡治愈至四十餘日始更衣則尤奇也用藥如用兵豈徒讀父書者之可為哉仁和趙夢齡菊齊陳嫗年已七旬辛亥秋患霍亂轉筋甚危亟延余診已目陷形消肢冷音颯脈伏無溺口渴汗多腹痛苔黃自欲投井因先取西瓜汁命與恣飲方用石膏知母麥冬黃柏芩連竹茹木瓜威靈仙略佐細辛分許煎成徐服覆杯而瘥醫者能知少加細辛之何故則可以言醫矣素園此方得效可見辨證之的若無汗而渴者又當別論謝城姊丈李華甫繼室陡患霍亂而兼溺血如注頭痛如劈自汗息微勢極危殆速余診視脈甚弦駃此肝火內熾暑熱外侵以犀角木通滑石梔子竹茹薏苡銀花茅根菊葉為大劑和入藕汁送當歸龍薈丸而吐瀉即已溺血亦減惟小便時頭猶大痛必使人緊抱其頭重撳其巔始可略耐尚是風陽僭極肺胃不清也以葦莖湯去桃仁加百合白薇元參小薊蒲公英竹葉西瓜翠衣蓮子心為方和入童溺仍吞龍薈丸服旬日全愈陳楚珍仲媳陡患霍亂云昨晚曾食冷魚夜分病作想因寒致病也然臍間貼以回陽膏而不效故敢求診余按脈滑數右甚口渴苔黃令揣胸下果堅硬而痛曰吐瀉雖多食尚戀膈非寒證也回陽膏亟宜揭去以菖枳蘇連芩桔茹牛海䖳蘆蔔為劑一服而瘳婦兄吳緑園癸丑仲夏陡患發熱嘔吐莖縮腹痛亟招余診脈弦軟而數苔色黃膩宜清厥陰蘊熱非痧也豫楝茹連斛梔柏銀花通草絲瓜絡為方一劑知數劑愈沈峻揚令妹年逾五旬體極瘦弱始則數夜不能眠忽一日目張不能闔淚則常流口閉不能開舌不能伸語難出聲飲不下咽足冷便祕筋瘛而疼身硬不柔胸膈板悶或謂暑痧重感慮即虛脫余視之苔黃不渴脈來弦細軟澀重按如無然神氣不昏身不發熱非暑痧也二便艱澀咽膈阻悶非脫證也殆由情志鬱結怒木直升痰亦隨之堵塞華蓋故治節不行脈道不利也但宜宣肺氣行自愈以紫菀白前兜鈴射干菖蒲枇杷葉絲瓜絡白豆蔻為方一劑知四劑愈證者證也如斷案之有證據也然證有真有僞有似是而非以致恆為所眩如此案辨暑脫則得其證矣素園證極危而方甚輕其效乃如神全由辨證之的謝城蔣敬堂令堂年七十四陡患嘔瀉身熱腹痛神思不清或以為霍亂或慮其虛脫迎余診之脈微弱而數曰暑脈自虛不可以高年而畏脫辛散痧藥則不免耗傷其津液爰定芩連滑斛茹柏銀花竹葉橘皮枇杷葉之方冬瓜湯煎一劑而熱退神清再劑霍然敬堂慷慨多情知醫施藥余契友也庚申春聞其爭先拒兵竟以被戕惜哉徐德生家一婢年十七矣陡患腹痛稍一言動則痛不可支以為急痧中惡遍治不應飛請余往尚以丹雄雞強伏其心下然神色如常並不吐瀉脈來牢澀苔色膩黃乃多食酸甘而汛阻也詢之果然以桃仁紅花生蒲黃靈脂香附延胡芍藥海䖳蘆蔔為方送龍薈丸遂愈陳哲堂令郎子堂甲寅春連日勞瘁奔馳之後忽然大便自遺並非溏瀉繼言腹痛俄即倦臥不醒及喚醒仍言腹痛隨又沉沉睡去或以為痧或以為虛邀余決之身不發熱二便不行舌無苔而渴脈弦澀不調非痧非虛乃事多謀慮而肝鬱飢飽勞瘁而脾困困而食滯於中也豫檳枳橘半楂曲蔔楝元胡海䖳服二劑痛移臍下稍覺知飢是食滯下行矣去楂曲加梔芍服一劑更衣而愈此證不難於認食滯而難於認肝鬱且當勞倦後見嗜臥證不以為痧必以為虛而兼用參朮以顧脾胃如此則肝愈不舒而變證作矣半癡用藥至輕而奏效至捷良由手眼雙絶素園余嘗問半癡曰既肝鬱於上而食不下行矣何以干矢自遺而不覺乎半癡謂胃與大腸原一氣相貫惟其食滯於胃而不化似與大腸氣不相貫故廣腸宿糞出而不覺經云中氣不足溲便為之變是亦變也所謂不足者非言中氣虛也以中氣為病所阻則不足於降濁升清之職故溲便為之改常也余聞而折服其善讀古書宜乎臨證之神明變化令人莫測也因思霍亂之吐瀉無度乾霍亂之便祕不行皆變也皆中氣為病所阻而不足於降濁升清之職也設泥不足為虛則諸霍亂皆當補中氣為治矣於是益嘆半癡闡發經旨為不誣菊齊此說與前釋邪之所湊其氣必虛之說可以互證謝城姜秋農瘧瀉初痊遽勞奔走陡患霍亂轉筋面臂色紫目陷音嘶胸悶苔黃汗多口膩神疲溲祕脈細而弦余以沙參蠶矢苡仁竹茹半夏絲瓜絡木瓜車前子扁豆葉陰陽水煎送左金丸一錢外以吳萸一兩研末調塗湧泉穴服後吐瀉漸止噫氣不舒厄忒脅痛汗減口燥脘下拒按脈軟而弦以素多肝鬱也去沙參蠶矢木瓜車前左金加紫菀鬱金楝實通草枇杷葉二帖溲行厄止苔退足溫腰脹腿痛手紫漸淡去郁菀通楝加沙參石斛蘭葉鮮藕稻露亦二帖脈和脹減啜粥口咸體素陰虧也去半夏扁豆葉加歸身花粉橘皮又二帖大解行而安穀腰痠少寐為易西洋參加麥冬羊藿以調之數帖後又加枸杞杜仲而愈此本虛標實之證須看其先後用藥之法琴仙此證頗急淺術必至張皇失措半癡遊刃有餘治標而不犯其本用藥與病機宛轉相赴於此服其識之老素園仲韶弟主於葉氏乙卯新秋陡患洞瀉如注即渾身汗出如洗懨懨一息夤夜速余往勘脈來沉細身不發熱儼似虛寒之證惟苔色黃膩小溲全無乃濕熱病也豫桂苓甘露飲加厚朴投匕而瘳丙辰仲夏遊武林仁和胡次瑤孝廉婦陡患肢麻昏暈以為急痧速余視之面微紅音低神憊睛微赤苔色微黃足微冷身微汗胸微悶脈微弦乃本元素弱謀慮縈思心火上炎內風隨以上僭豈可誤作痧閉妄投香散之藥哉以人參龍蠣菖連石英麥冬小麥竹葉蓮子心為方兩啜而瘥尋豫平補善其後次瑤醇謹博學與余交最深久欲卜居結鄰而未果庚申之變率妻妾登舟將來海昌城閉不能出與兵遇並一幼女殉節於河可哀也已季傑之妾秋夜陡患霍亂腹痛異常診其脈細數而弦肢冷畏寒蓋覆甚厚詢其口不渴而瀉亦不熱然小便全無吐者極苦舌黃甚赤新涼外束伏暑內發也絳雪玉樞丹灌之皆不受瀉至四五次始覺漸熱而口大渴仍不受飲語言微蹇余令搗生藕汁徐灌之漸能受隨以芩連苡楝梔斛桑茹蒲公英煎服痛即減吐瀉亦止改用輕清法而愈丁巳秋三侄壽和甫六歲陡患凜寒身熱筋瘛面紅譫妄汗頻四肢厥冷苔色黃膩口渴唇紅時邪夾食也以枳實梔豉湯加菖蒲及冬干蘆蔔菜煎成調入玉樞丹五分灌之次日譫瘛皆減而腹痛吐瀉邪欲轉霍亂以外泄也余嘗謂不但傷寒可轉霍亂而溫熱暑濕皆可轉霍亂也治當迎刃而導之於前方加蘇葉一分黃連二分同炒煎服連吐三五次瀉六七次痛即減第三日神始爽慧然去疾莫如盡再服原方一劑遂愈凡小兒之病因於食滯者多胃不和則臥不安陽明實則譫瘛若吐瀉乃病之出路而世人動輒以驚風藥治之每致僨事昧者更惑於巫瞽而祭非其鬼尤可嗤也余居渟溪七載家人雖屢患大證未嘗一用巫瞽亦未傷人鄉人目以為異庚申秋季傑之病甚危壽萱侄求籤於觀音大凶其妾欲事祈禱餘力止之卒以治愈附識之以戒我後人辛酉秋余息濮院盛行霍亂轉筋之證一男子胸次拒按余以蘆蔔子枳實檳榔等導之又某赤膊不容蓋覆猶云五內如焚目陷音嘶苔黃大渴而啜飲即吐肢厥脈伏市醫令服薑湯一杯幸不受適余至亟取冷雪水命將小匙徐灌之遂不吐更以石膏黃連知母瀉其逆沖之火而愈錢某患霍亂兼吐蛔十餘條而口乾脈細是暑伏厥陰以犯中也以連梅茹楝苡斛蘇芩清之而愈陳某患霍亂而所下皆血苔黃大渴而舌色紫黯乃暑毒深伏起病時又飲燒酒也用犀角益母地丁茅根菖蒲緑豆銀花芩連黃柏藕汁大劑灌之皆投匕而瘥一婦積虛患時症汗出如浴形脫聲嘶脈微欲絶為亡陽之候豫附子理中湯加白芍茯苓木瓜苡仁蠶沙而汗收脈起隨去薑附加黃耆證漸平去蠶沙加橘半調補而安劉氏婦患病已兩月不納穀矣忽吐瀉轉筋舌光聲啞氣液兩亡也亟以人參炙草石脂餘糧龍牡斛芍木瓜烏梅冬蟲夏草為方服兩劑音開脈續諸證皆平所親沈則甫按法調補而瘳吳氏子患此脈微弱舌色淡紅口微渴此本虛邪不盛也宜清解藥中加參以扶正氣則甫亦如法施治而愈今年三月間呂君慎庵言一童子在鄰嬉戲陡然吐瀉轉筋歸家即斃余以為偶然有此一證耳既而聞患此證者漸多四月初有餘杭紙客在舟次病此抵濮院乞余診已舌卷囊縮形脫神離不可救藥矣口開苔黑詢中途並未服藥竊謂此病之盛行多在夏秋暑濕之時何以今春即爾諦思其故暑濕既可伏至深秋而發為霍亂則冬傷於寒者至春不為溫病亦可變為霍亂也雖為溫病之變證而溫即熱也故與伏暑為病不甚懸殊或曰此揣度當然耳仲聖但有五苓理中治傷寒轉霍亂法未有治溫病轉霍亂之法何耶余謂古書傳兵火之餘難免遺亡之憾一隅三反在讀者之善悟焉且細繹仲聖書亦未嘗不微露其意也曰太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之張石頑注云溫病始發即當用黃芩湯去熱為主若傷寒必傳至少陽熱邪漸入里方可用黃芩佐柴胡解之蓋黃芩湯乃溫病之主方即桂枝湯以黃芩易桂枝而去生薑以桂枝主在表風寒黃芩主在裡風熱乃不易之定法其生薑辛散非溫熱所宜故去之此表裡寒熱之不可不知者也周禹載注云明言太少二陽何不用二經藥非傷寒也傷寒由表入里此則自內發外無表何以知太少二陽或脅滿或頭痛或口苦引飲或不惡寒而即熱故不得謂之表也如傷寒合病皆表病也今不但無表且有下利里證傷寒協熱利必自傳經而入不若此之即利也溫何以即利其人中氣本虛內伏已深不能盡泄於外勢必下走利矣雄案此論溫邪外發未久即可下走為利本文更有若嘔者句豈非溫病可轉霍亂早逗端倪於此乎曩纂溫熱經緯於此條下附注云少陽膽木挾火披猖嘔是上衝利由下迫何必中虛始利飲聚而嘔半夏生薑專開飲結如其熱熾宜易連茹楊素園先生評云此注精當非前人所及今治溫病轉為霍亂者似當奉此以為法也慎庵聞之極為折服再質宗匠還望有以教我愚意此證梔子似亦可用輕者亦可不必黃連未知是否惟大棗太守必宜去之謝城五月初三日余抵上洋霍亂轉筋已流行成疫居鎮海周君採山家不謁一客藉以藏拙且杜酬應之勞也初八日紹武近族稼書家有南潯二客同患此證一韓姓須臾而死一紀運翔年十七勢亦垂危採山強拉余往視曰豈可見死而不救哉然已手面皆黑目陷睛竄厥逆音嘶脈伏無溺舌紫苔膩大渴汗淋神情瞀亂危象畢呈時未交芒種暑濕之令未行仍是冬寒內伏春令過冷入夏猶涼氣機郁遏不宣故欲變溫病者皆轉為此證與伏暑為患者殊塗同歸但不腹痛耳以寒邪化熱究與暑濕較異也亟令刺曲池委中出血如墨方以黃芩為君臣以梔豉連茹苡半佐以蠶矢蘆根絲瓜絡少加吳萸為使陰陽水煎候溫徐徐服之遂不吐次日脈稍起又兩劑黑色稍淡肘膝稍和反加睛赤煩躁是伏邪將從外泄也去吳萸蠶矢加連翹益母草滑石而斑發遍身苔始漸化肢溫得寐小溲亦行隨與清搜化毒之藥多劑而痊採山因囑余詳述病因治法刊印傳布名其方曰黃芩定亂湯嗣治多人悉以此法增損獲效如利泰一洞庭史客素吸洋烟而患此證與此方數帖後反便祕目赤渴汗昏狂亦是久伏之邪漸欲外越也豫竹葉石膏湯加減而瘳其濕盛者加茵陳滑石氣實者加枳桔飲阻食滯者加厚朴蘆蔔肝鬱氣結者加紫蘇楝實口渴用茅根湯或藕汁頻灌活法在人不能縷述紹武在屠甸市得余此方勸人合藥施送幾及千料云此方加減有法較前尤妥善也謝城夏至後仍無大熱而霍亂轉筋不息雖與芒種以前者同為伏邪所發然證因略有不同其病似較深一層何也按先曾祖重慶堂隨筆云溫病熱病濕溫病治不得法皆易致死流行不已即成疫癘猶之治盜不得其法則賊黨日衆變為流寇也因熱氣病氣尸氣互相轇轕即成毒癘之氣而為疫豈真天地之間另有一種異氣哉故疫之流行必在人煙萃聚之區蓋人氣最熱紀文達公雜詩云萬家煙火暖云蒸銷盡天山太古冰自注烏魯木齊自設郡縣以來嬰兒出痘與內地同蓋彼處氣候極寒今則漸同內地人氣盛也紀氏此言可謂獨窺其微矣上古無痘至漢始有今時罕有不出痘者以生齒日繁地氣日熱所以古人最重傷寒今世偏多溫熱也雄案此段名言括盡近世病情治時證已無餘蘊矣而於此日上海病因尤為切貼地氣既日熱穢氣亦日盛加以疫氣尸氣與內伏之邪欲化熱病而不得者卒然相觸遂致濁不能降清不能升揮霍悶亂而為吐瀉轉筋之危證是伏邪欲發客邪外入兩邪交訌腸胃乃亂故氣道立時閉塞血脈因而瘀滯四肢厥冷手面皆黑陽明多氣多血之經見證若是之驟者非氣血忽然枯槁也夫人氣以成形耳氣不流行血肉即死故初起亟宜開閉俾氣通血活邪得外泄則正自復昧者不知邪閉血凝熱深厥深之理見其肢冷脈伏即以為寒又疑為脫即不敢刺更投熱藥使邪無宣泄愈閉愈冷尚謂服此熱藥一身盡冷可見黍谷春回之不易再遇此證仍用此法死者之冤無可呼籲雖有七竅流血而死者亦不悔悟亦有邪閉則正氣無以自容而外脫者陽從上脫則汗多而氣奪陰從下脫則瀉多而液亡所謂內閉外脫也欲其不外脫必開其內閉如紫雪絳雪行軍散皆開閉透伏之良方也而飛龍奪命丹即合行軍絳雪二方而加峻者且有人中白引濁下行尤具斬關奪命之能上虞陳君香谷聞之概為制送囑余詳敘方治刊布因而救全不少厥功偉哉自紀運翔之證治愈後凡患此者紛紛踵門求診情不能已徼幸成功者頗多然夏至以後病由內外合邪其勢更劇故必先以奪命丹開其閉伏愈後變證不一然隨機而應甚費經營非比往年之霍亂雖系危證但得轉機即可霍然也其故良由流離困苦失志勞神先有內傷遂多曲折故愈後調理極宜詳慎而上海多懋遷竄難之人病得轉機往往大意所謂病加於小愈因而致墮前功者不少如餘杭褚子耘茂才余親家也其使女患此已身僵矣適余往訪知之遂以香谷所贈奪命丹二分囑其灌入頃刻活動隨豫解毒活血湯數服得生嗣余往返崇明聞其仍淹纏不健而亡一王大生煙鋪夥友余治愈後已溺行能食餘熱外泄滿面赤瘰忽然神氣瞀亂而死一澧記錢鋪石某余為治愈二便已如常矣越數日云飲食不得下戴眼厄忒而逝一緑蔭書坊陶姓業已向愈忽然神情恍惚藥不及救此麗云為余述者又四明陳解香之弟患此垂危延余治愈遂不服藥月餘復來請勘已咽痛礙進水穀頤腫舌糜牙關甚緊痰嗽脅疼溺赤管痛便溏色醬此餘毒蘊隆失於清解遂致燎原若此是限於貧困養癰成患而脈已弦緊數疾莫可措手久之果斃並録為案以為賈旅告或云此地藥肆甚忙每致誤付病者誤服驟變彼此不知醫家病家皆須留意嗣閲冷廬醫話云吾邑陳莊李氏子患霍亂醫定方有製半夏二錢藥肆中誤以製附子與之服後腹大痛發狂口中流血而卒李歸咎於醫醫謂用藥不誤必有他故索視藥渣則附子在焉遂控於官罰藥肆以金和息之觀此則或人之言尤信然此案若病家良懦隱忍而不言醫者惶窘走避而不辨或藥渣棄無可證則此獄雖皋陶莫斷矣服藥可不慎哉朱鳴岐患下利轉筋醫見肢冷即投溫補而服藥即吐既而厄忒不已溫補加峻病日以危延至九朝已萬無生理備後事矣子耘主其家囑請余援脈至左弦滑右弱不應指苔黃厚而膩濁小水不行臍上拒按因謂曰病原不重誤藥致劇命不應死幸而得吐否則早為泉下人也豫枳桔芩連茹夏蘇翹蘆根枇杷葉滑石開痰行食舒結通陽兩劑厄果止而遍身赤斑又兩劑燥矢下而苔化溺行右脈漸振隨與清肅調養法而瘳勘朱證時適子耘令弟子方茂才在座曰如此重證君胡以為病原不重也余謂世間重證大半因誤治而成此證若初治得法一二劑可愈也奈舉世以瀉證吐證霍亂證霍亂轉筋證皆為寒證往往不察病情輒投熱藥今見肢冷而右脈軟弱彼方以為虛寒的據況服藥即吐厄忒隨來以霍亂轉筋而見厄忒何暇更問其餘皇皇然以為虛脫之象故溫補日以加峻縱使一蹶不起病家無怨醫者不悔也每見此地市醫臨證雖極輕之病必立重案預為避罪邀功之地授受相承伎倆如是良可慨已此外如胸腹疼痛瘧疾哮喘經阻産後等證世俗亦多指為寒病雖以熱藥殺之而彼此不知者而厄忒則尤多枉死焉余嘗治一角妓患厄纍日破身太早固是虛證然血去陰傷豈可反以溫燥助熱遂致下焦不攝素性畏藥余用一味雞子黃連進數服而安吳竹溪時感將瘥患厄三日聲聞於鄰人皆危之豫通府行氣法便行痰吐而痊南潯朱君浦香年五十六自幼患童勞繼以吐血三十外即絶欲得延至此而平素便如羊矢其血分之虧如是今秋陡患厄忒連服滋鎮溫納之藥勢瀕於危陸定圃進士囑延余診脈至弦滑搏數苔黃厚而膩口苦溺赤遂力排衆議主大劑涼潤如雪羹蔞仁竹瀝枇杷葉蘆根元參紫菀射干兜鈴菖蒲等多劑連下赤矢始瘳如此衰年虛體尚因痰熱致厄故虛寒之厄殊不多見而醫者不知辨證察脈率以丁香薑桂為不祧之藥何哉謝氏婦懷孕五月便瀉四日醫投薑附桂朴藥一帖遂四肢麻冷氣塞神昏溺閉汗淋大渴嘔吐急延余援脈未全伏先飲以醬油湯吐漸止隨豫參連芩柏茹斛銀花扁豆葉蒲桃干蘆根緑豆以冬瓜湯煎徐徐溫服外用炭醋熏之各恙皆瘥次日脈弦滑瀉未止以白頭翁湯加參草銀花扁豆蒲公英蒲桃干砂仁兩劑而痊婺源詹耀堂子年二十患霍亂服薑桂數劑瀉不止素吸鴉片疑為虛漏補之瀉益甚始延余視大渴而脈弦數幸而起病不因暑熱然陰分素虧雖飲冷貪涼熱藥豈堪過劑設無便瀉以分其藥力則津液早枯矣豫白頭翁湯合封髓丹加銀花緑豆石斛一劑知二劑已余赴申時過石門吳君仁山在濮院承其關切曰毗陵張仲遠觀察秀水楊嘯溪孝廉皆已自楚至申句當公事君可往訪也余感其意唯唯而謝緣久聞張氏家學淵源雖閨閣皆通翰墨然向見其宛鄰書屋醫書數種似偏尚溫補者曾與故人太倉王子能參軍言之子能亦善醫嘆曰人之才識學力各有能至不能至不可強也王半山不入相即是伊川一流秋壑鈐山能甘恬退不失為風雅之人陽明先生勳業燦然後人惜其多了講學一事若張氏者何必談醫世人信其學問而並信其醫因而貽誤者實多余弟季旭仲遠之妹壻也即為其所誤噫言猶在耳子能已下世十餘年矣乃嘯溪為仲遠來索余書余推故不與嗣聞仲遠之子患霍亂徑投六君子湯一劑而已是泥於扶正卻邪之說猶之寇來不戰但知守城卒以自斃耳秋間仲遠亦亡後蔣寅昉大理信來頗以余求書不與為是昔某侍郎督學吾漸亦以上工自命嘗浼邵位西樞部求書余亦不與所謂道不人談免俗譏備録為案願世人毋輕言醫事必量而後入也錢塘姚歐亭協轉復宰崇明聞余在滬新秋囑余弟𡸅庵比部持函聘余往遊以初夏偶患大瀉後苦脾約更旬始一更衣既而匝月一行甚至月餘一行極其艱滯而先硬後溏汗出神憊年逾六秩步履蹇滯雖廣服人乳及潤導諸藥率不效間或納食如梗嘔吐酸辣六脈遲軟苔色白潤不渴小便清長腹無脹痛此真中氣不足溲便為之變也豈腸燥便祕可以潤藥濡之哉既不宜潤更不可下以中虛開闔無權恐一開而不復闔將何如耶亦不可升提蓋吐酸食梗已形下祕上衝之勢又素吸洋烟設一闔而竟不開又將何如耶爰以參朮橘半旋芍雞金木瓜枇杷葉為方服六劑更衣兩次解四彈丸又三劑解十五六丸又三劑下九丸而始暢並不堅燥亦無溏矣毫不怯力是藥證已符為留調理法而別設或吐酸食梗則暫用參連橘半旋茹蘇葉枇杷葉紫石英以清肅鎮息之八月初秋陽正烈歐亭因公來申久住舟中從者皆病況久虛初愈之體乎初七日忽然身熱嘔瀉哲嗣小歐別駕急速余勘白苔滿布神憊不支腹痛汗頻音低溺澀先豫參連夏朴茹滑苡蘇蠶沙扁豆葉二劑熱退神清而左脈仍弦關上高嘔酸無寐手足振惕客邪雖解土受木乘也去滑朴蠶沙扁豆葉加茯神蛤殼紫菜緑豆白蔻仁三劑苔化能眠知飢瀉減去蔻蛤加菖蒲白朮五劑而痊霍亂之開闔失常中樞為邪所亂也此證之開闔無權中虛不能主持也一實一虛正可互勘至愈後之嘔瀉振惕又為風暑乘虛擾中之霍亂證故詳列拙治統質通方汪謝城孝兼招勘婺源石雨田司馬令慈年近五旬陡患霍亂轉筋苔黃大渴神情煩躁證屬伏暑脈頗不惡而渾身冷汗搖扇不停已為陽越之象不敢與方尋即告殞此憑證不憑脈也次日簠齊薦視朱君巽泉之尊人年已六旬患霍亂轉筋證不甚劇問答音清而脈微欲絶亦決其不治已而果然此憑脈不憑證也汪金皆善醫皆以余言為不謬逾半月簠齊於丙夜患此證刺出黑血侵曉速余往視形脈兩脫大汗如淋目陷音嘶溺無苔膩平素嗜飲少谷好善忘勞暑濕蘊中正氣潰散勉投參藥竟不能救惜哉因挽以一聯云飄泊正無聊感草載神交萍聚申江將檢殘編求品鑑考終原是福徑一朝仙去風淒秋夜那堪衰鬢喪知音次女定宜年二十體實耐勞適同邑戴氏初旬接女夫信云女於八月二十三日忽患痛瀉肢冷脈伏崔某進附子理中湯加減瀉不止而苔黑唇燥頗露熱象改投犀斛生脈散等藥形漸脫又用附桂八味湯遂於二十九日舌焦如炭而逝彌留時語壻曰吾父在此病不至是也噫據此病情是伏暑也戴氏為積德世醫家余曩刻業書十種渠處皆有竟使誤藥而亡良可慘已郵挽一聯云垂老別兒行只因膳養無人吾豈好遊說不盡憂勤惕厲底苦衷指望異日歸來或藉汝曹娛暮景瀕危思父療雖曰死生有命爾如鑄錯試遍了燥熱寒涼諸謬藥回憶昔年鞠育徒傾我淚灑秋風嗚呼良朋愛女同病同日而亡斯重訂之役尤不可已矣並附挽言一以志交情一以志藥誤也霜降前水北族侄棋偕邀勘所親蔣君循庵之媳患霍亂轉筋交三日矣厥逆目竄膈悶無溺苔黃苦渴脈極弦細屢進桂附薑術氣逆欲死豫昌陽瀉心湯加減煎成徐服外以吳萸研末滷調貼湧泉穴服二劑吐止足溫去蘇朴加楝斛蒲公英多劑始痊蓋伏暑挾素盛之肝陽為病誤服溫補以致遽難廓清也禾中方氏女播遷三載秋仲抵申患吐瀉其戚錢伯聲孝廉邀余視之一藥而瘥既而患腫因在旅寄竟不調治交霜降腫忽消不數日又患霍亂即神氣瞀亂屋中盤走口呼姊姊乃姊強納之臥兩目旋轉不停淚涔涔下牙關即緊欲延余診竟不及也伯聲詢故余曰此流離困苦憂鬱深沉木土相乘吐瀉而腫節交霜降氣肅腫消郁無所宣直凌脾胃吐瀉陡作木火勃升狂走目張陽從上越此情志內傷霍亂也故告危如是之速南潯沈春泉年五十七立冬前五日食蟹面後陡患霍亂轉筋所吐瀉者皆水初進桂附藥筋轉益甚周身微汗神倦懶言指漸冷脈漸伏時欲太息更方用牡蠣一兩龜版八錢阿膠四錢服後勢較劇延余視之苔黃大渴小便全無瀉出極熱心下拒按伏暑挾食之證不知何所見而豫燥補澀膩之藥乃病家謂其品學書畫甚優故深信而不疑竟以不起可憐又可笑也嗣聞其次郎於立冬後亦患此證醫知伏暑用黃連等藥吐瀉已止因脈未遽起不知為伏熱不清改投附桂等三帖而亡尤可哀已上虞羅吉人立冬前患霍亂轉筋子耘知其陰素虧病由伏暑也服藥已得轉機數日後漸有厄忒延余視之脈弦數左甚苔焦而渴齦衄脘悶便溏色醬小便短赤皆伏暑未清氣機阻塞之象既失清肅乃當臍尚帖回陽膏屢囑揭去而不從後聞不起此非敗證余深惜之南潯張二梅年逾六旬秋間患霍亂轉筋醫見高年而厥逆多汗擬進溫補張不敢服但用平淡單方及外治法而瘥然從此大便不堅時時自汗遍身瘡疥畏熱異常延至立冬後邀余診之脈甚滑數口渴苔黃便溺皆熱猶著夾衣是賦質偏陽濕熱內盛幸而畏進溫補得以引年與大劑清化法漸愈又今年患疥者舉目皆是所謂遍地瘡痍洵非虛語外治之方甚多而平善者罕效更有治不得法瘡驟愈而變證遽隕其生者毒陷內訌也子耘傳一方頗佳以麻黃一兩川椒五錢蛇床子五錢斑蝥七枚雄豬油或柏油熬透去渣另用明礬黃柏各一兩萆麻子大楓子各四十粒共研末入油內絹包擦患處能拔蘊毒伏邪未出旬日可愈無後患此與火酒摩轉筋之義正同勿以藥猛而訾之故附録於此無徵不信有法可師爰採群書南針是仰然病情之幻伏猶敵情之譎觚似是而非云非恰是千態萬狀莫可端倪謬以身經附為夢影蓋時移事易境似炊粱而比燭擬槃癡同捫籥或竹頭木屑亦大匠所需敢質通方毋嗤瑣陋故列醫案第三藥方篇第四藥性原蠶沙諸霍亂之主藥也黃芩溫病轉霍亂之主藥凡吐下而熱邪痞結上焦胸次不舒者並可與黃連半夏同用石膏暑熱霍亂之主藥凡吐利而苔黃大渴者並宜用之外挾風寒者佐以紫蘇桂枝香薷生薑之類內挾痰滯者佐以厚朴半夏菖蒲橘紅之類下兼寒濕者佐以防己細辛海桐皮威靈仙之類滑石濕熱霍亂之主藥熱甚者佐石膏濕甚者佐茵陳薏苡仁霍亂轉筋溺祕者之主藥也木瓜霍亂轉筋溺不祕者之主藥也香薷夏令浴水迎風而霍亂之主藥也扁豆中虛而暑濕霍亂之主藥也西洋人參虛人霍亂之主藥也枳桔蘆蔔子停食霍亂之主藥也梔豉石菖蒲穢濁霍亂之主藥也楝實黃柏桑葉絲瓜霍亂而肝火盛者之主藥也茅根地丁益母蒲公英霍亂而血分熱熾之主藥也竹茹石斛蘆根梔子枇杷葉霍亂嘔噦之主藥也厚朴蘆蔔大腹皮霍亂脹滿之主藥也茵陳連翹緑豆皮絲瓜絡霍亂身黃之主藥也通草車前海金沙霍亂無溺之主藥也緑豆銀花竹葉黃連霍亂誤服熱藥之主藥也旋覆紫菀麥糵蘆蔔子霍亂誤補之主藥也人參龍骨牡蠣甘草石脂餘糧霍亂大虛欲脫之主藥也桂枝傷寒轉霍亂之主藥也紫蘇藿香生薑厚朴白豆蔻霍亂因外寒之主藥也吳茱萸烏藥砂仁高良薑霍亂因內寒之主藥也人參白朮炙甘草蓮子中虛而寒濕霍亂之主藥也丁香木香川椒神麯瓜果魚蟹生冷傷中霍亂之主藥也乾薑附子肉桂硫黃陽虛中寒而霍亂及寒霍亂誤服寒藥之主藥也方劑臥龍丹治諸痧中惡霍亂五絶諸般卒倒急暴之證西牛黃飛金箔各四分梅花冰片荊芥羊躑躅各二錢麝香當門子五分硃砂六分豬牙皂角一錢五分燈心炭二錢五分九味共研細瓷瓶密收毋使泄氣以少許搐鼻取嚏垂危重證亦可以涼開水調灌分許並治癰疽發背蛇蠍蜈蚣咬傷用酒塗患處按羊躑躅俗名鬧羊花辛溫大毒湯不入劑只可用以取嚏近目即昏翳今肆中臥龍丹以此為君藥又去牛黃而加蟾酥減輕燈心炭而冰麝不過略用些須耳故藥力大遜甚不可恃好善者必自配製也案冰片近日有一種洋冰以樟腦升提者性熱萬不可用又方西黃六分梅片當門子北細辛各一錢牙皂羊躑躅各二錢燈心炭一兩七味制如上法主治亦同立效丹治同上硃砂三兩明雄黃硼砂各一兩八錢梅冰當門子各九錢火硝六錢蓽茇牛黃各三錢八味共研細瓷瓶緊收勿令泄氣每用分許蘆管吹入鼻內若卒倒氣閉重證則七竅及臍中均可放置立蘇凡暑月入城市抹少許於鼻孔可杜穢惡諸氣開關散治番痧臭毒腹痛如絞氣閉神昏欲絶之證燈心炭一兩羊躑躅三錢北細辛杜蟾酥牙皂各二錢牛黃梅片當門子各一錢八味共研細瓷瓶緊裝毋令泄氣每少許吹鼻得嚏即生速效丹治諸痧手足麻木牙關緊急目閉不語胸背有紅點或咽腫心痛及風餐露宿寒暑雜感危急之證北細辛牙皂各三錢五分硃砂二錢五分廣木香陳皮桔梗貫衆薄荷葉防風製半夏甘草各二錢枯礬一錢五分白芷一錢十三味共研細末瓷瓶緊裝每用三分吹入鼻孔寒濕內盛而病重者開水調服一錢方內入蘇合香二錢尤妙按痧藥方藥品珍貴者多惟此價廉用以搐鼻頗亦有效故人徐君亞枝嘗合大料交余在淳溪施送纍年鄉人無不感頌甘露消毒丹天士治暑濕霍亂時感痧邪及觸冒穢惡不正之氣身熱倦怠脹悶肢痠頤腫咽痛身黃口渴瘧痢淋濁泄瀉瘡瘍水土不服諸病但看病人舌苔淡白或厚膩或干黃者疫邪尚在氣分悉以此丹主之凡醫臨證亦當准此化裁自可十全為上飛滑石十五兩綿茵陳十一兩淡黃芩十兩石菖蒲六兩川貝母木通各五兩藿香連翹射干薄荷葉白豆蔻各四兩十一味不可加減生曬研細末瓷瓶密收每服三錢開水溫服日二或以神麯糊丸如彈子大調化服亦可此丹治濕溫時疫著效亦神纍年同人合送價廉功敏無出此方之右者一名普濟解疫丹太乙玉樞丹一名解毒萬病丹治諸痧霍亂諸疫癘氣喉風五絶尸疰鬼胎驚忤癲狂百般惡證及諸中毒諸癰疽水土不服黃疸鼓脹蛇犬蟲傷內服外敷功難殫述洵神方也山慈姑去皮洗淨焙川文蛤即五倍子捶破洗刮內桴千金子即續隨子去油取淨霜各二兩紅芽大戟洗焙一兩當門子三錢五味先將慈蛤戟三味研極細末再入霜香研勻糯米湯調和乾溼得宜於辰日淨室中木臼內杵千餘下每料分四十錠故亦名紫金錠再入飛淨硃砂飛淨明雄黃各五錢尤良或以加味者杵成薄片切而用之名紫金片每服一錢涼開水調下孕婦忌之又不可與甘草藥同進也太乙紫金丹治霍亂痧脹嵐瘴中惡水土不服喉風中毒蛇犬蟲傷五絶暴厥癲狂癰疽鬼胎魘魅及暑濕溫疫之邪瀰漫熏蒸神明昏亂危急諸證山慈姑川文蛤各二兩紅芽大戟白檀香安息香蘇合油各一兩五錢千金霜一兩明雄黃飛淨琥珀各五錢梅冰當門子各三錢十一味各研極細再合研勻濃糯米飲杵丸緑豆大外以飛金為衣每錢許涼開水下按一瓢云此方比蘇合丸而無熱較至寶丹而不涼兼玉樞丹之解毒備二方之開閉洵為濟生之仙品立八百功之上藥也又按昔人所云太乙丹能治多病者即上二方也今俗傳太乙丹不知創自何人藥品龐雜群集燥熱惟風餐露宿藜藿人寒濕為病者服之頗宜若一概施之誤人匪淺行軍散治霍亂痧脹山嵐瘴癘及暑熱穢惡諸邪直干包絡頭目昏暈不省人事危急等證並治口瘡喉痛點目去風熱障翳搐鼻闢時疫之氣西牛黃當門子真珠梅冰硼砂各一錢明雄黃飛淨八錢火硝三分飛金二十頁八味各研極細如粉再合研勻瓷瓶密收以蠟封之每三五分涼開水調下千金丹一名人馬平安散治同上明雄黃硼砂硝石各一兩硃砂五錢梅冰當門子各二錢飛金一百頁七味各為細末合研勻瓷瓶緊裝每二三分涼開水下或嗅少許於鼻內或加牛黃洄溪云此祕方也紫雪治痧脹穢毒心腹㽲痛霍亂火熾躁瞀煩狂及暑火溫熱瘴疫毒癘諸邪直犯膻中猝死溫瘧發斑狂易叫走五尸五疰鬼魅驚癇急黃蠱毒麻痘火閉口舌生瘡一切毒火邪火穿經入臟蘊伏深沉無醫可治之證黃金百兩石頑云須賃金鋪中煉過葉子煮之方有性味而止用十兩薛公望雲不用亦可洄溪云如用飛金萬頁研入尤妙寒水石石頑云如無真者以元精石代之磁石醋煅石膏白滑石各三斤石頑止用各五兩四石共搗碎用水一斛石頑一斗連金煮至四斗石頑五升去滓入下藥犀角屑羚羊角屑青木香切沉香研各五斤石頑止用五錢按斤字恐是兩字之訛丁香一兩石頑止用一錢洄溪云可用二兩元參切升麻各一斤石頑用一兩六錢甘草八兩石頑用生者八錢洄溪用炙八味入前藥汁中煮取一斗五升石頑一升五合去滓入下藥朴硝十斤石頑用芒硝一兩焰硝四斤石頑用三兩洄溪云余制此二硝止用十之一二味入前藥汁中微火上煎柳木篦攪不住手候有七升石頑七合半投在木盆中半日欲凝入下藥硃砂研細水飛淨三兩石頑五錢當門子研一兩二錢五分石頑一錢二分二味入前藥中攪勻勿見火寒之二日候凝結成霜紫色鉛罐密收每服三四分至一錢量用新水調灌按雞峰方無磁石滑石硝石二角只用各十兩丁沉木香各五兩升麻六兩朴硝二斤麝香卻用三兩餘六味分兩同醫通云此方即千金元霜加甘草丁香硃砂三味遂易紫雪之名余以其香味易散故減小其制竊謂宜從張氏配合為是碧雪治熱極火閉痧脹昏狂及霍亂誤服熱藥煩燥瞀亂及時疫憒亂便祕發斑一切積熱咽喉腫痛口糜齦爛舌瘡喉閉水漿不下等證寒水石石膏硝石朴硝芒硝牙硝青黛甘草八味等分先將甘草煎湯去滓納諸藥再煎以柳木篦不住手攪令消熔得所卻入青黛和勻傾入砂盆內候凝結成霜研細密收每錢許涼開水下上焦病以少許含化咽津不能咽物者蘆筒吹入喉中齒舌病抹患處絳雪一名八寶紅靈丹治霍亂痧脹肢厥脈伏轉筋昏暈瘴癘時疫暑毒下痢等證並治喉痹牙舌諸病湯火金刃諸傷均搽患處硃砂牙硝各一兩明雄黃硼砂各六錢礞石煅四錢梅片當門子各三錢飛真金五十頁八味擇吉日淨室中各研極細再研勻瓷瓶緊收熔蠟封口毋使泄氣每一分涼開水送下小兒減半以藥佩帶身上可闢疫氣牛馬羊瘟以此點其眼即愈飛龍奪命丹治痧脹㽲痛霍亂轉筋厥冷脈伏神昏危急之證及受溫暑瘴疫穢惡陰晦諸邪而眩暈痞脹瞀亂昏狂或卒倒身強遺溺不語身熱瘛瘲宛如中風或時證逆傳神迷狂譫小兒驚癇角弓反張牙關緊閉諸證硃砂飛二兩明雄黃燈心炭各一兩人中白漂煅八錢明礬青黛飛各五錢梅冰麻黃去節各四錢真珠牙皂當門子硼砂各三錢西牛黃二錢杜蟾酥火硝各一錢五分飛真金三百頁十六味各研極細合研勻瓷瓶緊收毋令泄氣以少許吹鼻取嚏重者再用開水調服一分小兒減半按此丹芳香闢穢化毒祛邪宣氣通營全體大用真有斬關奪隘之功而具起死回生之力也煉雄丹治暑穢痧邪直犯包絡神明閉塞昏憒如尸及霍亂初定餘熱未清驟爾神昏如醉如寐身不厥冷脈至模糊者皆燥熱無形之氣矇蔽膻中如人在煙塵障霧中行治失其宜漸漸燥悶而死此非牛黃清心犀角地黃等方可療此丹主之極明雄黃一分研極細提淨牙硝六分研細同入銅勺內微火熔化撥勻俟如水時急濾清者於碗內粗渣不用俟其凝定收藏此丹灶家祕製也按此法見遊宦紀聞陳平伯載此方黃多而硝少素園糾其誤謂黃多硝少何能熔化今依楊定雄一硝六為率木通一錢通草三錢陳雨水一碗用冬雪水似更良煎出味去滓再以陳雨水九碗與藥汁和勻每次用藥水一碗磨入犀角三分挑入煉雄三釐調勻徐徐冷灌能於三日內服盡十碗藥水必有清痰吐出數碗而愈簠齊嘗親驗矣三聖丹治寒濕為病諸痧腹痛霍亂吐瀉木香一兩不見火明雄黃二兩明礬三兩共研細末以鮮荷葉橘葉藿香葉各二兩搗汁丸緑豆大每服九分重者再服蟾酥丸治暑月貪涼飲冷食物不慎兼吸穢惡成痧脹腹痛或霍亂吐瀉杜蟾酥燒酒化硃砂飛各五錢明雄黃飛茅山蒼朮土炒焦各一兩丁香牙皂各三錢當門子一錢七味各研極細蟾酥打丸鳳仙子大辰砂為衣放舌底化下重者二三丸洄溪云此祕方也又方治同上杜蟾酥燒酒化開明雄黃水飛各三錢丁香木香沉香各二錢茅山蒼朮土炒焦四錢硃砂飛一錢五分當門子一錢西牛黃三分九味各研極細擇上吉日淨室中合研勻同蟾酥加糯米粽尖五個搗千餘下丸如椒子大曬乾盛於瓷碗內再用硃砂一錢五分燒酒調塗碗內蓋好用力搖一二千下則光亮矣密收瓷瓶內每三粒輕者一粒重者五粒泉水下姚氏蟾酥丸治同上杜蟾酥燒酒浸煬如無杜酥可以東酥加倍明雄黃研硃砂飛各二兩木香曬丁香曬茅朮炒滑石飛各四錢當門子一兩八味各研極細和入蟾酥杵勻丸黍米大每藥丸就四兩以火酒噴濕蓋在碗內加入飛淨硃砂六錢竭力搖播以光亮為度本方去木香滑石當門子名截痧丸治痧甚效方亦較穩又方一名通靈萬應丹治同上而力較峻杜蟾酥九錢燒酒化錦紋大黃曬乾六兩硃砂飛明雄黃飛明天麻焙乾麻黃去節焙各三兩六錢丁香六錢甘草去皮微炒二兩四錢當門子三錢茅朮米泔水浸切焙三兩十味各為細末以糯米粥漿和杵丸蘆蔔子大硃砂為衣每七丸納舌下少頃陰陽水下若研細吹鼻亦可取嚏霹靂散治陽虛中寒腹痛吐瀉轉筋肢冷汗淋苔白不渴脈微欲絶者附子濃甘草湯煎去毒吳茱萸泡去第一次汁鹽水微炒各三兩陳伏龍肝二兩燒酒一小杯收干木瓜絡石藤七錢煎汁炒乾一兩五錢丁香蒸曬一兩絲瓜絡燒酒洗五兩六味共為極細末分作十九服外以醋半酒杯鹽一錢五分藕肉一兩五錢煎滾瓦上炙存性研每服加三釐每病止須用半服參湯下按確係寒證此散固佳若未辨陰陽而用熱藥以為外治尚無大害內服之藥極宜審慎勿輕試也回陽膏治同上生香附或用吳茱萸亦可一兩八錢母丁香一兩二錢上桂心八錢倭硫黃五錢當門子四錢五味共研極細瓷瓶密收每二三分安臍中以膏藥封之一時即愈孕婦忌貼按霍亂轉筋既有寒暑之分亦有寒暑雜感而成者更有暑伏於內而寒束於外者故服藥最宜審慎況利多亡陰津液大奪雖可投熱藥者亦恐剛烈劫陰終於不救此方藥雖猛峻而僅取其氣由臍入腹自能溫通臟腑以逐寒邪不致傷陰誠為善策惟口渴苔黃下利極熱者顯為陽證雖見肢冷脈伏亦勿妄貼此膏更張其焰也以上諸方雖分別熱證寒證之治而和平猛厲用得其宜並皆佳妙然非倉卒可辦者故列諸前茅冀仁人君子量力製備刊明藥味證治廣為傳播俾醫家病家一覽瞭然不但將死者可以得生而不死者亦不致誤藥以喪其生利濟之功不其偉哉方下兼及別證治例者既不敢沒良方之大用且以推廣施藥之仁懷也黃芩湯傷寒論治溫病變霍亂之主方用者因證加減黃芩三兩炙草芍藥各二兩大棗十二枚水一斗煮取三升去渣溫服一升日再夜一服黃芩加半夏生薑湯傷寒論原方加半夏半升生薑三兩按冬傷於寒至春發為溫病有或瀉或嘔之兼證皆少陽犯陽明也故仲聖以黃芩清解溫邪協芍藥泄迫血之熱而以甘棗夏姜奠安中土法至當矣其溫病轉為霍亂果由中虛飲聚而伏邪乘之者仍宜以此法治之如火勢披猖上衝下迫或脈數口渴或熱深厥深則無藉乎奠中滌飲當從事於瀉火清中舉一反三在人善悟也梔子豉湯傷寒論治溫熱暑疫轉為霍亂之主劑梔子十四枚香豉四合綿裹水四升先煮梔子得二升半內豉煮取升半去滓分二服按此傷寒吐劑也然古方梔子生用故能湧吐今皆炒黑用之雖不作吐洄溪謂其滌熱除煩之性故在也而余之治熱霍亂獨推以為主劑蓋梔子苦寒善泄鬱熱故肘後方以之治乾霍亂矣豉經蒸腐性極和中凡霍亂多由濕鬱化熱挾穢濁惡氣而擾攘於中宮惟此二物最為對證良藥奈昔人皆不知察也且二物之奇匪可言罄如偶以銀花竹葉清暑風配以白蔻菖蒲宣穢惡濕甚者臣以滑朴熱勝者佐以芩連同木瓜扁豆則和中合甘草鼠黏而化毒其有誤投熱藥而致煩亂躁悶者亦可藉以為解救厥功懋矣而古今之治霍亂者從不引用豈非一大闕典耶白虎湯傷寒論治暑熱熾盛而為霍亂者石膏一斤知母六兩甘草炙二兩粳米六合水一斗煮米熟湯成去滓溫服一升日三服按治霍亂粳米須用陳倉者或用生苡仁亦妙白虎加人參湯傷寒論治證如前而元氣已虛者原方加人參三兩按白虎湯神於解熱妙用無窮加人參則補氣以生津加桂枝則和營而化瘧加蒼朮則清濕以治痿變而為竹葉石膏湯則為熱病後之補劑余因推廣其義凡暑熱霍亂之兼表邪者加香薷蘇葉之類轉筋之熱極似寒非反佐莫能深入者少加細辛威靈仙之類痰濕阻滯者加厚朴半夏之類血虛內熱者加生地地丁之類中虛氣弱者加白朮苡仁之類病衰而氣短精乏者加大棗枸杞之類無不奏效如神也竹葉石膏湯傷寒論治中虛暑熱霍亂及霍亂已定而餘熱未清虛羸少氣者竹葉二握生石膏一斤半夏半升洗人參三兩麥門冬一升粳米半升甘草炙二兩水一斗先煮六味取六升去滓內粳米煮米熟湯成去米溫服一升日三按集驗云此方加生薑治嘔最良余謂治霍亂宜用地漿煎更妙桂苓甘露飲河間治暑熱挾濕之霍亂桂去皮白朮豬苓各五錢茯苓去皮澤瀉各一兩滑石四兩寒水石石膏甘草炙各二兩一方甘草一兩五錢九味為末每三錢溫水或新汲水或生薑湯量證調下小兒每服一錢按此方一名桂苓白朮散一方不用豬苓或云去豬苓加人參名桂苓白朮散六一散即益元散一名天水散桂府膩白滑石六兩甘草炙一兩二味為末每三錢溫水或新汲水調下日三挾表邪者以蔥白五寸豆豉五十粒煎湯調下本方加黃丹名紅玉散加青黛名碧玉散加薄荷名雞蘇散加硃砂名辰砂益元散蔥豉湯肘後治霍亂髮斑蔥白一握香豉三合水煎入童子小便一合日三服按石頑云本方藥味雖輕功效最著凡虛人風熱伏氣發溫及産後感冒靡不隨手獲效余謂胎前外感何嘗不是妙劑蘆根竹葉蘇葉黃芩可以隨證佐入四苓散溫疫論治濕盛霍亂胸悶溺澀而渴者茯苓豬苓澤瀉橘皮水煎服按吳氏五苓去桂而治胃中濕熱最為有見且以橘皮易術則無實中之弊而有利氣之功當變而變斯為善用古法欲平霍亂者宜知所趨響矣吳又可溫疫論解理透闢用藥靈活為病家不可不閲之書素園平胃散局方治濕盛於中霍亂吐瀉茅朮去粗皮米泔浸四兩紫厚朴去皮薑汁炒陳皮去白各三兩二錢甘草炙二錢四味為末每服二錢水一盞姜一片煎七分服轉筋者加木瓜本方加藿香半夏名金不換正氣散藿香正氣散治濕蘊於中寒襲其外而為霍亂吐瀉者厚朴陳皮桔梗白朮半夏各二兩大腹皮一本作蒼朮或用檳榔亦可白芷茯苓蘇葉藿香各三兩甘草炙一兩十一味為粗末每三錢姜三片棗一枚煎服蘭臺軌範此方無白朮似更妥謝城按上二方皆治風寒外感食滯內停或兼濕邪或吸穢氣或傷生冷或不服水土等證的是良方若溫暑熱證不兼寒濕者在所切禁今人謂其統治四時感證不審病情一概濫用誤人不少用治霍亂薑棗宜裁半夏厚朴湯一名四七湯金匱治情志不舒痰濕阻氣而成霍亂者半夏一升厚朴三兩茯苓四兩干蘇葉二兩生薑五兩水七升煮取四升分溫四服按此方既主七情不適之郁痰證亦治寒濕不化風感外侵食滯不消誤投滋補因而病劇者無不所響輒捷六和湯治夏月虛人外感風寒內傷生冷之霍亂吐瀉而身發熱者香薷二錢人參茯苓甘草扁豆厚朴制木瓜杏仁去皮半夏各一錢藿香砂仁炒研各六分生薑三片大棗一枚水煎服香薷飲局方治暑月乘涼飲冷陽氣為陰邪所遏頭痛發熱惡寒煩躁口渴腹滿之霍亂香薷一斤厚朴薑汁炒白扁豆各半斤三味為粗末每五錢至一兩水煎冷服黃連香薷飲活人治同上原方加薑汁炒黃連四兩左金丸治霍亂轉筋肝火內熾或吐青緑苦水者川連六兩吳茱萸取陳而開口者一兩二味同煮乾為細末米飲糊丸緑豆大每三錢陳木瓜五錢煎湯下吐酸味者竹茹生苡仁各三錢煎湯下按張雨農司馬見余採此方極為首肯云嘗在都城見杜石樵少宰亦用此藥治愈多人也黃芩定亂湯治溫病轉為霍亂腹不痛而肢冷脈伏或肢不冷而口渴苔黃小水不行神情煩躁黃芩酒炒焦梔子香豉炒各一錢五分原蠶沙三錢製半夏橘紅鹽水炒各一錢蒲公英四錢鮮竹茹二錢川連薑汁炒六分陳吳萸泡淡一分陰陽水二盞煎一盞候溫徐服轉筋者加生苡仁八錢絲瓜絡三錢溺行者用木瓜三錢濕盛者加連翹茵陳各三錢燃照湯霍亂論治暑穢挾濕霍亂吐下脘痞煩渴苔色白膩外顯惡寒肢冷者飛滑石四錢香豉炒三錢焦梔二錢黃芩酒炒省頭草各一錢五分製厚朴製半夏各一錢水煎去滓研入白蔻仁八分溫服苔膩而厚濁者去白蔻加草果仁一錢連朴飲霍亂論治濕熱蘊伏而成霍亂兼能行食滌痰製厚朴二錢川連薑汁炒石菖蒲製半夏各一錢香豉炒焦梔各三錢蘆根二兩水煎溫服蠶矢湯霍亂論治霍亂轉筋肢冷腹痛口渴煩躁目陷脈伏時行急證晚蠶沙五錢生苡仁大豆黃卷各四錢陳木瓜三錢川連薑汁炒三錢製半夏黃芩酒炒通草各一錢焦梔一錢五分陳吳萸泡淡三分地漿或陰陽水煎稍涼徐服解毒活血湯夢影治溫暑痧邪深入營分轉筋吐下肢厥汗多脈伏溺無口渴腹痛面黑目陷勢極可危之證連翹絲瓜絡淡紫菜各三錢石菖蒲一錢川連吳萸水炒二錢原蠶沙地丁益母草各五錢生苡仁八錢銀花四錢地漿或陰陽水煮生緑豆四兩取清湯煎藥和入生藕汁或白茅根汁或童便一杯稍涼徐徐服駕輕湯霍亂論治霍亂後餘邪未清身熱口渴及餘熱內蘊身冷脈沉湯藥不下而發厄者鮮竹葉生扁豆各四錢香豉炒石斛各三錢枇杷葉刷二錢橘紅鹽水炒陳木瓜各一錢焦梔一錢五分水煎溫服昌陽瀉心湯夢影治霍亂後胸前痞塞湯水礙下或渴或厄石菖蒲黃芩酒炒製半夏各一錢川連薑汁炒五六分蘇葉三四分製厚朴八分鮮竹茹枇杷葉刷各三錢蘆根一兩天雨水急火煎徐徐溫服小溲祕澀者加紫菀此方甚巧謝城按此瀉心湯證也何必另立方治以暑熱穢濁之邪與傷寒不同故五瀉心皆有圓柄方鑿之格漫為引用豈徒無益已哉茲以菖蒲為君辛香不燥一名昌陽者謂能掃滌濁邪而昌發清陽之氣也合諸藥以為劑其奏蠲痰泄熱展氣通津之績已歷試不爽矣麥門冬湯金匱治霍亂後餘熱未清神倦不飢無苔而渴或火升氣逆乾咳無痰麥冬一兩製半夏一錢五分人參一錢甘草炙六分粳米半合大棗四枚擘水煎溫分四服按海藏以竹葉易半夏治溫熱後房勞復之氣欲絶者大效余謂即不因房勞復而氣液兩虧不能受重劑峻補皆可以此湯接續其一線之生機余屢用輒效致和湯霍亂論治霍亂後津液不復喉乾舌燥溺短便溏北沙參生扁豆石斛陳倉米各四錢枇杷葉刷鮮竹葉麥冬各三錢陳木瓜六分生甘草一錢水煎服五苓散傷寒治傷寒轉霍亂身熱頭痛渴欲飲水白朮石頑云宜用生白朮茯苓豬苓各十八銖按二十四銖為一兩每銖重四分二釐弱六銖為錙即二錢五分十八銖即七錢五分澤瀉一兩六錢桂五錢五味為末以白飲和服方寸匕日三多飲暖水汗出愈按仲聖於霍亂分列熱多寒多之治皆為傷寒轉為霍亂而設故二多字最宜玩味所云熱多者謂表熱多於裡寒也寒多者裡寒多於表熱也豈可以熱多二字遂謂此方可治熱霍亂哉沈果之云其用桂者宣陽氣通津液於周身非用之以通水道下出也用瀉朮二苓以通三焦之閉塞非開膀胱之溺竅也如果熱入而渴復用桂術以溫液耗津又加苓澤以滲之是熱之又熱耗之又耗速之斃矣余謂觀此則多飲暖水汗出愈之義益明故霍亂無陽氣鬱遏身熱之表證無三焦閉塞氣化不宣之裡證而欲飲水者切勿誤解熱多為熱證而妄援聖訓浪投此藥也石頑又可皆語焉未詳河間則加三石以駕馭之茲復詳述方義庶用者知所取捨焉而今人治濕熱病不察其有無外挾風寒內傷生冷之兼證輒以胃苓湯為通用之方因則僨事者亦多且古方用散不過三錢權量又小今世改為湯劑動輒一二兩權量又大宜乎中病者恆少而誤人者恆多也豈獨霍亂然哉可慨也夫又按此方與苓桂朮甘湯同為溫中滌飲之劑而力較峻凡霍亂之寒濕內盛水飲阻閉三焦者雖外無風寒之表邪未嘗不可用也故亦治水蓄之疝濕聚之腫氣滯者加厚朴氣虛者加人參名春澤湯用藥如用兵苟能量敵而選將斯戰無不克矣理中丸傷寒論治寒霍亂口不渴者人參甘草白朮乾薑各三兩四味搗篩為末蜜和丸雞子黃大以沸湯數合和一丸碎研溫服之日三夜二腹中未熱益至三四丸然不及湯湯法以味依兩數切用水八升煮取三升去滓溫服一升日三加減法若臍上築者腎氣動也去朮加桂四兩尤氏云臍上築者臍上築築然跳動腎氣上而之脾也脾方受氣術之甘能壅脾氣故去之桂之辛能下腎氣故加之按此陽虛之腎氣動欲作奔豚也故去朮加桂以杜其上凌之萌若陰虛而臍上築築者大忌剛燥之劑非峻滋肝腎之陰不可蓋一為水動一為火動也吐多者去朮加生薑三兩尤氏云吐多者氣方上壅甘能壅氣故去朮辛能散氣故加生薑按鄒潤安云即吐且利有屬太陰者有屬少陰者在少陰則無用術之理在太陰亦在可用不可用之列以術能治脾胃虛不能治脾胃實故吐多者去之下多者還用之蓋術能舉脾之陷不能定胃之逆也又洄溪云寒霍亂可用理中者百不得一余謂是霍亂矣可用理中矣尚有如此細密加減之法何今人既不議病又不議藥輕於一試何異以不教之民而使之戰耶籲可哀已下多者還用術悸者加茯苓二兩尤氏云下多者脾氣不守故須術以固之悸者腎水上逆故加茯苓以導之按今人治霍亂既不辨其證之虛實寒熱亦不察其吐多下多溫補率投漫無忌憚者吾不知其何心也渴欲得水者加朮足前成四兩半尤氏云渴欲得水者津液不足白朮之甘足以生之按此渴因脾虛不能為胃行其津液故加朮以補脾而致其津夜也所謂白朮能生津液者其義如此豈熱爍津液而渴者所堪一試哉腹中痛加人參足前成四兩半尤氏云腹中痛者裡虛不足人參之甘足以補之按裡虛腹痛必喜溫按寒者加乾薑足前成四兩半尤氏云寒者腹中氣寒也乾薑之辛足以溫之按五苓主熱多謂表有熱也理中主寒多謂里有寒也故方下既有腹中未熱益至三四丸之法此復云寒者加乾薑是腹中尚未熱故獨於此味又加重也蓋腹中寒為寒之真諦故仲聖不嫌煩復而瑣瑣教人以此為辨證之法顧昧者一見吐下肢寒略不察其腹中光景何如擅以薑附丁桂欲其轉熱遂至從此而一身皆冷嗚呼豈未聞熱深厥深之聖訓乎腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被尤氏云腹滿者氣滯不行也氣得甘則壅得辛則行故去朮加附子按飲熱粥一升許固是助藥力亦是辨證法設時行熱霍亂不但熱粥在所大忌即使不忌亦萬不能強飲升許果能飲熱粥升許者豈非虛寒為病乎故可以理中治之若蔽於古而不知今是房琯之以車戰也按原方加附子名附子理中湯加青皮陳皮名治中湯加枳實茯苓名枳實理中湯加黃連名連理湯合五苓名理苓湯厚朴生薑半夏甘草人參湯傷寒論治虛人寒濕霍亂厚朴去皮炙生薑切各半斤半夏洗半升甘草炙二兩人參一兩水一斗煮取三升去滓溫服一升日三四逆湯傷寒論治陰寒霍亂汗出而四肢拘急小便復利脈微欲絶而無頭痛口渴者生附子一枚乾薑一兩半甘草炙二兩水三升煮取一升二合去滓分溫再服強人可用大附子一枚乾薑三兩按附子乾薑非攻蕩之品何以強人乃可加倍用蓋無論補瀉寒熱諸藥皆賴身中元氣載之以行故氣強者堪任重劑若氣弱者投劑稍重則氣行愈餒焉能駕馭藥力以為補瀉寒熱之用耶凡事皆然用藥特其一端耳顧知之者鮮所以覆敗多而成功少也通脈四逆加豬膽汁湯傷寒論治陰寒霍亂愈後四肢拘急脈微欲絶者前方加入豬膽汁半合和服如無豬膽以羊膽代之附子粳米湯金匱治中寒霍亂肢冷腹痛吐少嘔多者附子薑汁炮切半夏薑汁炒甘草炙各三錢大棗十枚擘粳米半升水五升煮米熟湯成去滓溫服一升吳茱萸湯傷寒論治少陰吐利厥逆煩躁及厥陰寒犯陽明食谷欲嘔吳茱萸一斤洗人參三兩生薑六兩切大棗十二枚擘水七升煮取二升去滓分三服漿水散潔古治陰寒霍亂暴瀉如水汗多身冷氣少腹痛脈沉或脫者甘草乾薑附子桂各五錢良薑半夏俱醋炒各二錢漿水煎去滓冷服按石頑云漿水乃秫米和曲釀成如醋而淡今人點牛乳作餅用之或用澄緑豆粉之漿水尤佳余謂地漿亦可用冷香飲子治陰寒霍亂腹痛脈沉細或弦緊無汗惡寒面如塵土四肢厥逆陽氣大虛之證甘草附子草果仁橘紅各一錢生薑五片水煎冷服大順散局方治襲涼飲冷陰寒抑遏陽氣而成霍亂水穀不分脈沉而緊者甘草四兩八錢乾薑杏仁去皮尖桂心各六錢四分先將甘草同白沙炒至八分黃熟王晉三云白沙即河沙次入乾薑同炒令姜裂次入杏仁同炒候不作聲為度篩去沙與桂心同搗為散每二錢水煎服或沸湯調服如煩躁井華水調下按洄溪云此治暑月內傷飲冷證非治暑也又甘草多於諸藥八倍亦非法此等病百不得一而世人竟以治燥火之暑病殺人無算可勝悼哉余謂以上三方皆治夏令因畏熱而浴冷臥風冰瓜過啖反為陰濕所傷致病實夏月之傷寒也故用藥如是如名醫類案所載羅謙甫治商參政與完顏小將軍二案俱用熱藥俱不名曰暑病又吳球治暑月遠行人案直曰中寒蓋深恐後世誤以熱藥治暑故特舉病因以稱之可謂名正言順矣乃昧者猶誤謂此等方為治暑之藥誠有一盲引衆盲相將入火坑之嘆夫盛夏之有寒病猶隆冬之有熱病雖不多見而臨證者不可不諦辨而施治也神香散景嶽治霍亂因於寒濕凝滯氣道者丁香白豆蔻各七粒二味研末清湯下小腹痛者加砂仁七粒按晉三云此方治寒濕痧脹有神功與益元散治濕熱痧脹可謂針鋒相對來復丹局方治上盛下虛裡寒外熱伏暑夾陰霍亂危證太陰元精石舶上硫黃硝石各一兩用硫黃為末微火炒結成砂子大橘紅青皮去皮五靈脂澄去砂炒令煙盡各二錢六味為末醋糊丸豌豆大每服三十丸白湯下桂枝湯傷寒論治寒霍亂後身痛不休桂枝去皮芍藥生薑切各三兩甘草炙二兩大棗十二枚擘水七升微火煮取三升去滓適寒溫服一升須臾啜稀熱粥一升余以助藥力異功散治霍亂後中虛主劑人參一錢至三錢白朮炒黃一錢至二錢半茯苓一錢至錢半甘草炙六分至一錢橘紅一錢水煎服肝風動而身痛肢浮者加木瓜薑棗梅花丸治體虛多郁血熱氣愆木土相乘嘔瀉腹痛易感痧穢霍亂者久服可杜外患兼除宿恙亦主肝胃久痛消癥調經帶催生種子孕婦忌之緑萼白梅蕊三兩飛滑石七兩以粉丹皮八兩煎汁制透去丹皮曬乾四制香附三兩甘松蓬莪朮各五錢山藥茯苓各三錢五分人參潞參洋參高麗參皆可因人酌用嫩黃耆益智仁砂仁勿見火各三錢遠志肉甘草水制二錢五分木香不見火一錢五分桔梗一錢甘草七分十五味各研細末合研勻煉白蜜搗丸每丸重一錢白蠟衣之每一丸去衣開水調服按此方調和氣血舒郁培元男女皆堪久服以杜諸疴不僅可已肝胃之痛而御腸胃之亂也孕婦體堅或胎氣多滯者正宜用以宣展充暢惟虛而不固者忌之資生丸調和脾胃運化飲食滋養營衛消除百疾可杜霍亂等患人參酌用同上白朮各三兩橘紅楂肉神麯各二兩茯苓一兩五錢甘草炙五錢川連薑汁炒白蔻仁各三錢五分九味研細末煉蜜搗丸彈子大每食後細嚼一丸開水下嚴寒時或用淡薑湯下按石頑云此古方也與後人加味者雖繁簡不同而功效不異繆氏資生丸治同上人參人乳浸飯上蒸烘乾白朮米泔水浸山黃土拌蒸九次曬九次去土切片焙乾各三兩楂肉蒸橘紅略蒸各二兩白茯苓細末水澄蒸曬乾入人乳再蒸曬乾懷山藥切片炒白扁豆炒湘蓮肉炒芡實粉炒薏苡仁炒各一兩五錢麥芽炒研磨取淨面一兩藿香葉不見火各三錢五分甘草去皮炙桔梗米泔浸去蘆蒸各五錢澤瀉切片炒白蔻仁勿見火各三錢五分川連如法炒七次三錢十七味如法修制細末煉白蜜搗丸每丸重二錢飲後白湯或橘皮湯砂仁湯嚼化下按治法匯醫通蘭臺軌範載此方皆有神麯二兩其餘分兩亦稍有參差名醫方論有神麯無澤瀉廣筆記云妊娠三月陽明脈養胎陽明脈衰胎無所養故易墮也宜服此丸洄溪云此方治懷孕氣阻用兼消補之法以止嘔吐而固胎氣意頗可取余謂保胎止吐皆健運脾胃之功故曰資生夫脾胃位鎮中樞而司出納為人生後天之本一失健運百病叢生凡衰老稚弱及飢飽不時勞逸過度思慮久傷之輩脾胃尤易受病若能常服此丸俾升降不愆周流無滯揮霍撩亂於是弭焉俱收並蓄待用無遺為將為醫理無二致對證發藥諺語堪師十劑七方陳圖有法故必藥性明而兵法諳始可制方臨敵也先藥性後方劑特其大略耳神明變化存乎其人方先外治而後內服昭慎重也始臥龍而中結以致和末殿以資生其有如臥龍之才者出而撥亂反正以致中和則天地位萬物育化日舒長更何疫癘之有哉謹拭目待之以慰余重訂此書之意焉故列藥方第四
