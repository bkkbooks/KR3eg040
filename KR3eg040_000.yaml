body:
  text: 跋霍亂急證也而古無專書間或及之亦語焉未詳故臨證者苦無成法可遵海昌王夢隱先生曩遊玉環嘗著專論以壽世定州楊素園大尹重刻於西江謂其理明辭達指陳病機若黑白之不可混淆顧海內多故板之存否杳不可知壬戌夏此間霍亂盛行求先生書不易得適先生避亂來遊惻然傷之慨將原稿重為校訂語加暢法加詳類證咸備寓意特深讀此書者苟能隅反不但為霍亂之專書也因請於先生亟付剞劂以質恫瘝在抱之君子同治二年夏五月鎮海陳亨謹跋於上海崇本堂
